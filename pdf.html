<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuvexPDF - 現代極速版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>

    <style>
        /* 背景與環境光 */
        body { 
            background-color: #f8fafc; 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); 
            background-size: 32px 32px; 
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%; width: 50vw; height: 50vh;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            bottom: -10%; right: -10%; width: 50vw; height: 50vh;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.02);
        }

        .loader { 
            border: 3px solid rgba(99, 102, 241, 0.2); 
            border-top: 3px solid #6366f1; 
            border-radius: 50%; 
            width: 20px; height: 20px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 拖曳動畫與視覺回饋 */
        .draggable-item { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s; cursor: grab; }
        .draggable-item:active { cursor: grabbing; transform: scale(0.98); }
        .draggable-item:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -8px rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.3); }

        .dragging-source { opacity: 0.4; transform: scale(0.95); border: 2px dashed #a5b4fc; background: #eef2ff; }
        
        .drag-target-hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
            border-color: #6366f1 !important;
            background-color: #f5f7ff !important;
            z-index: 10;
        }

        .sidebar-insert-hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            z-index: 20;
        }

        /* 編輯器卡片 */
        .page-card { cursor: grab; transition: all 0.2s ease; }
        .page-card:hover { transform: translateY(-4px); box-shadow: 0 15px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
        .page-card .delete-overlay { opacity: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%); transition: opacity 0.2s; }
        .page-card:hover .delete-overlay { opacity: 1; }
        
        /* 側邊欄項目 */
        .sidebar-item { cursor: grab; transition: all 0.2s; border: 1px solid transparent; }
        .sidebar-item:hover { background-color: #ffffff; border-color: #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .sidebar-target-hover { border-left: 4px solid #6366f1 !important; background-color: #eef2ff !important; padding-left: 12px; }

        /* 卷軸美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white;
            padding: 0.75rem 1.5rem; border-radius: 99px;
            font-size: 0.875rem; font-weight: 500;
            opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="font-sans text-slate-700 min-h-screen flex flex-col selection:bg-indigo-100 selection:text-indigo-900">

    <div class="flex-1 container mx-auto px-4 py-12 max-w-4xl relative z-10">
        
        <div class="text-center mb-10 animate-fade-in-up">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-fuchsia-500 shadow-lg shadow-indigo-500/30 mb-5 transform hover:scale-105 transition-transform cursor-default">
                <i class="fas fa-layer-group text-2xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-fuchsia-600">Nuvex</span>PDF
            </h1>
            <p class="text-slate-500 font-medium">安全、極速的本地端 PDF 處理工具</p>
        </div>

        <div class="glass-panel rounded-3xl overflow-hidden relative">
            
            <div class="px-8 py-5 border-b border-slate-200/60 flex flex-col sm:flex-row items-center justify-between bg-white/40 gap-4">
                <div class="flex items-center gap-3">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold text-sm shadow-sm">1</span>
                    <h2 class="text-lg font-bold text-slate-800">上傳與合併</h2>
                </div>
                <div class="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-full">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    本機端處理，檔案絕不上傳
                </div>
            </div>

            <div class="p-8">
                <div id="drop-zone-merge" class="group relative mb-8 transition-all duration-300">
                    <label class="flex flex-col items-center justify-center w-full h-56 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer bg-slate-50/50 hover:bg-indigo-50/80 hover:border-indigo-400 transition-all duration-300 overflow-hidden">
                        
                        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-indigo-50/30 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        
                        <div class="relative flex flex-col items-center justify-center pointer-events-none transition-transform duration-300 group-hover:-translate-y-2">
                            <div class="w-16 h-16 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center mb-4 group-hover:shadow-md transition-shadow group-hover:text-indigo-600 text-slate-400">
                                <i class="fas fa-cloud-upload-alt text-3xl transition-colors"></i>
                            </div>
                            <p class="text-lg font-bold text-slate-700 mb-1">點擊或拖曳檔案至此</p>
                            <p class="text-sm text-slate-400 font-medium">支援 PDF 格式，自動解除一般加密</p>
                        </div>
                        <input type="file" id="merge-input" class="hidden" multiple accept="application/pdf" onchange="handleMergeFiles(this.files)">
                    </label>
                </div>

                <div id="merge-ui-container" class="hidden transition-all duration-500">
                    <div class="flex justify-between items-end mb-4 px-1">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">
                            待合併清單 <span id="file-count" class="bg-indigo-100 text-indigo-700 py-0.5 px-2 rounded-full text-xs ml-1">0</span>
                        </h3>
                        <span class="text-xs text-indigo-600 font-medium flex items-center gap-1.5 opacity-80">
                            <i class="fas fa-info-circle"></i> 雙擊卡片進入「頁面編輯」
                        </span>
                    </div>

                    <div id="file-list" class="space-y-3 mb-8 min-h-[100px]">
                        </div>

                    <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-slate-100">
                        <button onclick="executeMerge()" id="btn-merge" class="flex-1 py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-900/20 transition-all active:scale-[0.98] flex justify-center items-center gap-2 group">
                            <i class="fas fa-layer-group group-hover:rotate-12 transition-transform"></i> 
                            <span>開始合併檔案</span>
                        </button>
                        
                        <a id="merge-download" href="#" class="hidden flex-1 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-500/30 transition-all active:scale-[0.98] text-center flex justify-center items-center gap-2">
                            <i class="fas fa-download animate-bounce"></i> <span>下載合併結果</span>
                        </a>
                    </div>
                </div>

                <div id="empty-state-hint" class="text-center py-8 flex flex-col items-center">
                    <div class="w-16 h-1 h-16 rounded-full bg-slate-100 flex items-center justify-center mb-3">
                        <i class="fas fa-file-pdf text-slate-300 text-2xl"></i>
                    </div>
                    <p class="text-slate-400 text-sm font-medium">尚未加入任何檔案</p>
                </div>

            </div>
        </div>

        <div class="text-center mt-8 text-slate-400 text-sm font-medium">
            <p>NuvexPDF © 2025 • Local Processing</p>
        </div>
    </div>

    <div id="page-editor-modal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 sm:p-6 transition-opacity duration-300 opacity-0">
        
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-7xl h-[92vh] flex flex-col relative overflow-hidden transform transition-transform scale-95 origin-bottom">
            
            <div id="editor-drop-overlay" class="absolute inset-0 hidden flex flex-col items-center justify-center text-indigo-600 bg-white/95 backdrop-blur-sm z-50 transition-all">
                <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6 animate-bounce shadow-lg shadow-indigo-200">
                    <i class="fas fa-file-import text-4xl"></i>
                </div>
                <p class="text-3xl font-extrabold tracking-tight">放開以插入頁面</p>
            </div>

            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-white z-30">
                <div>
                    <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-indigo-100 flex items-center justify-center text-indigo-600">
                            <i class="fas fa-edit text-sm"></i>
                        </div>
                        <span id="editor-filename" class="truncate max-w-[200px] sm:max-w-md">頁面編輯器</span>
                    </h3>
                    <p class="text-xs text-slate-500 mt-1.5 flex items-center gap-2">
                        <span><i class="fas fa-arrows-alt text-slate-400"></i> 拖曳排序</span>
                        <span class="text-slate-300">|</span>
                        <span><i class="fas fa-trash-alt text-slate-400"></i> 點擊移除</span>
                        <span class="text-slate-300">|</span>
                        <span class="text-indigo-600 font-semibold bg-indigo-50 px-2 py-0.5 rounded">支援跨檔案拖入</span>
                    </p>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeEditor()" class="px-5 py-2.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-xl text-sm font-bold transition">取消</button>
                    <button id="btn-save-editor" onclick="saveEditorChanges()" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-md shadow-indigo-500/20 flex items-center gap-2 transition active:scale-95">
                        <i class="fas fa-check"></i> <span>確認修改</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden relative bg-slate-100/50">
                
                <div id="modal-scroll-container" class="flex-1 overflow-y-auto p-6 scroll-smooth relative">
                    <div id="editor-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 z-20 hidden backdrop-blur-sm">
                        <div class="loader w-12 h-12 border-4 border-indigo-500 mb-4"></div>
                        <p class="text-slate-600 font-bold mt-2 animate-pulse" id="editor-loading-text">解析頁面中...</p>
                    </div>
                    
                    <div id="page-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 pb-20">
                        </div>
                </div>

                <div class="w-72 bg-slate-50/80 backdrop-blur border-l border-slate-200 flex flex-col shadow-inner z-20 hidden md:flex">
                    <div class="px-5 py-4 border-b border-slate-200 flex justify-between items-center bg-white/50">
                        <span class="font-bold text-xs text-slate-500 uppercase tracking-wider">資源庫 (其他檔案)</span>
                        <i class="fas fa-photo-video text-slate-300"></i>
                    </div>
                    <div id="sidebar-file-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                        </div>
                    <div class="p-4 bg-indigo-50/80 text-xs text-indigo-700 border-t border-indigo-100/50 flex gap-3 items-start">
                        <i class="fas fa-lightbulb mt-0.5 text-indigo-400"></i>
                        <p class="font-medium leading-relaxed">按住清單項目，將其拖曳至左側編輯區，即可快速插入該檔案的所有頁面。</p>
                    </div>
                </div>
            </div>
            
            <div class="px-6 py-3 border-t border-slate-200 bg-white z-30 flex justify-between items-center text-xs font-medium">
                <span class="text-slate-500">目前總頁數: <b id="editor-page-count" class="text-indigo-600 text-base ml-1">0</b> 頁</span>
                <span class="flex items-center gap-2 text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.8)]"></div> 
                    系統就緒
                </span>
            </div>
        </div>
    </div>

    <div id="global-toast" class="toast flex items-center gap-2">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toast-msg">操作成功</span>
    </div>

    <script>
        window.onerror = function(m) { if (!m.includes('pdfjsLib') && !m.includes('tailwindcss')) console.error(m); };

        let mergeFiles = [], currentEditingFileId = null, editorPagesData = [], isDraggingPage = false;
        let currentMouseY = 0, scrollAnimationId = null, editorDragCounter = 0, imageObserver = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await initPdfWorker();
            setupUploadZone('drop-zone-merge', handleMergeFiles);
            initAutoScroll();
            setupEditorDropZone(); 
            imageObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        loadPageThumbnail(parseInt(entry.target.dataset.idx), entry.target);
                        imageObserver.unobserve(entry.target);
                    }
                });
            }, { root: document.getElementById('modal-scroll-container'), rootMargin: "200px" });
        });

        function showToast(msg) {
            const toast = document.getElementById('global-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function initPdfWorker() {
            if (typeof pdfjsLib === 'undefined') return;
            const u = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
            try {
                const r = await fetch(u); if(!r.ok) throw new Error();
                pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(new Blob([await r.text()], {type:"text/javascript"}));
            } catch (e) { pdfjsLib.GlobalWorkerOptions.workerSrc = u; }
        }

        async function getFileArrayBuffer(fileItem) {
            return fileItem.blob ? await fileItem.blob.arrayBuffer() : await fileItem.file.arrayBuffer();
        }

        async function smartLoadPdf(arrayBuffer, password) {
            const { PDFDocument } = PDFLib;
            try { return await PDFDocument.load(arrayBuffer); } 
            catch (e) {
                if (e.message.includes('encrypted')) {
                    if (password) return await PDFDocument.load(arrayBuffer, { password: password });
                    try { return await PDFDocument.load(arrayBuffer, { password: '' }); } 
                    catch (e2) { throw e; }
                } throw e; 
            }
        }

        function setupUploadZone(id, callback) {
            const el = document.getElementById(id);
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                el.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
            });
            ['dragenter', 'dragover'].forEach(e => el.addEventListener(e, () => el.classList.add('scale-[1.02]', 'border-indigo-400', 'bg-indigo-50/80')));
            ['dragleave', 'drop'].forEach(e => el.addEventListener(e, () => el.classList.remove('scale-[1.02]', 'border-indigo-400', 'bg-indigo-50/80')));
            el.addEventListener('drop', (e) => callback(e.dataTransfer.files));
        }

        async function handleMergeFiles(fileList) {
            if (!fileList || fileList.length === 0) return;
            document.getElementById('merge-ui-container').classList.remove('hidden');
            document.getElementById('empty-state-hint').classList.add('hidden');

            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) continue;
                const fileId = Date.now() + Math.random().toString(36).substr(2, 9);
                try {
                    let arrayBuffer = await file.arrayBuffer();
                    let pdfDoc;
                    try {
                        pdfDoc = await smartLoadPdf(arrayBuffer.slice(0));
                        if (pdfDoc.isEncrypted) {
                            const decryptedBytes = await pdfDoc.save();
                            arrayBuffer = decryptedBytes.buffer; 
                            file.decryptedBlob = new Blob([decryptedBytes], { type: 'application/pdf' });
                        }
                    } catch (e) {
                        const pwd = prompt(`檔案「${file.name}」需要開啟密碼：`);
                        if (pwd) {
                            try {
                                pdfDoc = await smartLoadPdf(arrayBuffer.slice(0), pwd);
                                const decryptedBytes = await pdfDoc.save();
                                arrayBuffer = decryptedBytes.buffer; 
                                file.decryptedBlob = new Blob([decryptedBytes], { type: 'application/pdf' });
                            } catch { alert(`密碼錯誤，略過「${file.name}」。`); continue; }
                        } else { continue; }
                    }
                    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
                    const pdfProxy = await loadingTask.promise;
                    const page = await pdfProxy.getPage(1);
                    const viewport = page.getViewport({ scale: 0.3 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const indices = Array.from({ length: pdfProxy.numPages }, (_, k) => k);
                    mergeFiles.push({
                        id: fileId, file: file, name: file.name,
                        originalPageCount: pdfProxy.numPages, pageIndices: indices,
                        thumbnail: canvas.toDataURL(), blob: file.decryptedBlob || null 
                    });
                } catch (err) { console.error("Load failed:", err); }
            }
            document.getElementById('merge-input').value = '';
            renderMergeList();
            if(fileList.length > 0) showToast('檔案已成功加入');
        }

        function renderMergeList() {
            const listEl = document.getElementById('file-list');
            document.getElementById('file-count').innerText = mergeFiles.length;
            listEl.innerHTML = '';
            mergeFiles.forEach((item, displayIndex) => {
                const el = document.createElement('div');
                el.className = "draggable-item bg-white border border-slate-200 rounded-xl p-3 flex items-center gap-4 relative group select-none";
                el.draggable = true;
                el.ondblclick = () => openPageEditor(item.id);
                
                el.innerHTML = `
                    <div class="cursor-move text-slate-300 group-hover:text-indigo-400 px-1 opacity-50 group-hover:opacity-100 transition-all">
                        <i class="fas fa-grip-vertical text-lg"></i>
                    </div>
                    <div class="relative shrink-0 pointer-events-none group-hover:scale-105 transition-transform duration-200">
                        <div class="w-12 h-16 bg-white border border-slate-200 shadow-sm flex items-center justify-center overflow-hidden relative">
                            <div class="absolute top-0 right-0 w-3 h-3 bg-slate-100 border-l border-b border-slate-200 rounded-bl"></div>
                            <img src="${item.thumbnail}" class="w-full h-full object-cover opacity-90">
                        </div>
                    </div>
                    <div class="flex-1 min-w-0 pointer-events-none">
                        <h4 class="text-sm font-bold text-slate-700 truncate mb-1">${item.name}</h4>
                        <p class="text-xs text-slate-400 flex items-center gap-2">
                            <span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-mono font-semibold">${item.pageIndices.length} 頁</span>
                            <span class="text-slate-300">|</span>
                            <span>原始: ${item.originalPageCount} 頁</span>
                        </p>
                    </div>
                    <button onclick="removeFile('${item.id}')" class="w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all z-10 opacity-0 group-hover:opacity-100 focus:opacity-100" title="移除檔案">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                
                el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/type', 'file_item'); e.dataTransfer.setData('text/index', displayIndex); el.classList.add('dragging-source'); });
                el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-target-hover'); });
                el.addEventListener('dragleave', () => { el.classList.remove('drag-target-hover'); });
                el.addEventListener('drop', (e) => { e.preventDefault(); el.classList.remove('drag-target-hover'); if (e.dataTransfer.getData('text/type') !== 'file_item') return; const fi = parseInt(e.dataTransfer.getData('text/index')); const ti = displayIndex; if (fi !== ti && !isNaN(fi)) { const m = mergeFiles[fi]; mergeFiles.splice(fi, 1); mergeFiles.splice(ti, 0, m); renderMergeList(); } });
                el.addEventListener('dragend', () => { el.classList.remove('dragging-source'); document.querySelectorAll('.drag-target-hover').forEach(i => i.classList.remove('drag-target-hover')); });
                listEl.appendChild(el);
            });
            updateMergeBtnState();
        }

        function removeFile(id) { mergeFiles = mergeFiles.filter(f => f.id !== id); renderMergeList(); }

        async function openPageEditor(fileId) {
            const fileObj = mergeFiles.find(f => f.id === fileId);
            if (!fileObj) return;
            currentEditingFileId = fileId;
            editorPagesData = []; 
            editorDragCounter = 0;
            document.getElementById('editor-drop-overlay').classList.add('hidden');
            const modal = document.getElementById('page-editor-modal');
            const grid = document.getElementById('page-grid');
            const loader = document.getElementById('editor-loading');
            
            document.getElementById('editor-filename').innerText = fileObj.name;
            modal.classList.remove('hidden');
            
            // Trigger reflow for animation
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modal.firstElementChild.classList.remove('scale-95');
            
            grid.innerHTML = ''; 
            loader.classList.remove('hidden');
            renderSidebarList();
            try {
                const arrayBuffer = await getFileArrayBuffer(fileObj);
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                for (let i = 0; i < fileObj.pageIndices.length; i++) {
                    const originalIndex = fileObj.pageIndices[i];
                    editorPagesData.push({ fileId: fileId, pageIndex: originalIndex, imgSrc: null, status: 'pending' });
                }
                renderEditorGrid(); 
            } catch(e) { console.error(e); alert("無法讀取頁面"); } finally { loader.classList.add('hidden'); }
        }

        function renderEditorGrid() {
            const grid = document.getElementById('page-grid');
            grid.innerHTML = ''; 
            editorPagesData.forEach((pageData, displayIndex) => {
                const div = document.createElement('div');
                div.className = "page-card bg-white p-2.5 rounded-xl border border-slate-200 relative group select-none flex flex-col";
                div.draggable = true;
                
                let imgContent = (pageData.status === 'loaded' && pageData.imgSrc) 
                    ? `<img src="${pageData.imgSrc}" class="w-full h-full object-contain">` 
                    : `<div class="w-full h-full flex flex-col items-center justify-center text-slate-300 lazy-placeholder" data-idx="${displayIndex}"><div class="loader mb-2 w-6 h-6 border-2 border-indigo-200 border-t-indigo-500"></div><span class="text-[10px]">載入中</span></div>`;
                
                div.innerHTML = `
                    <div class="delete-overlay absolute inset-0 z-10 rounded-xl flex justify-end p-2 pointer-events-none">
                        <button onclick="removePageInEditor(${displayIndex})" class="pointer-events-auto bg-red-500 hover:bg-red-600 text-white rounded-full w-7 h-7 flex items-center justify-center shadow-lg transform hover:scale-110 transition-all" title="刪除此頁">
                            <i class="fas fa-times text-sm"></i>
                        </button>
                    </div>
                    <div class="w-full aspect-[1/1.4] bg-slate-50 overflow-hidden rounded-lg border border-slate-100 pointer-events-none flex items-center justify-center shadow-sm relative">
                        ${imgContent}
                    </div>
                    <div class="flex justify-between items-center mt-2.5 px-1 text-[11px] font-mono">
                        <span class="bg-indigo-50 text-indigo-700 px-1.5 py-0.5 rounded font-bold">P.${displayIndex + 1}</span>
                        <span class="text-slate-400" title="原始檔案中的頁碼">原 ${pageData.pageIndex + 1}</span>
                    </div>
                `;
                
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/type', 'page_item'); e.dataTransfer.setData('text/index', displayIndex); div.classList.add('dragging-source'); isDraggingPage = true; });
                div.addEventListener('dragover', (e) => { e.preventDefault(); if (e.dataTransfer.getData('application/x-nuvex-file-id')) div.classList.add('sidebar-insert-hover'); else div.classList.add('drag-target-hover'); });
                div.addEventListener('dragleave', () => { div.classList.remove('drag-target-hover'); div.classList.remove('sidebar-insert-hover'); });
                div.addEventListener('drop', async (e) => { 
                    e.preventDefault(); div.classList.remove('drag-target-hover'); div.classList.remove('sidebar-insert-hover'); isDraggingPage = false; 
                    const sid = e.dataTransfer.getData('application/x-nuvex-file-id'); 
                    if (sid) { e.stopPropagation(); await handleSidebarFileDrop(sid, displayIndex); return; } 
                    if(e.dataTransfer.getData('text/type') !== 'page_item') return; 
                    const fi = parseInt(e.dataTransfer.getData('text/index')); const ti = displayIndex; 
                    if (fi !== ti && !isNaN(fi)) { 
                        const item = editorPagesData[fi]; editorPagesData.splice(fi, 1); editorPagesData.splice(ti, 0, item); renderEditorGrid(); 
                    } 
                });
                div.addEventListener('dragend', () => { div.classList.remove('dragging-source'); document.querySelectorAll('.drag-target-hover, .sidebar-insert-hover').forEach(x => x.classList.remove(x.classList[x.length-1])); isDraggingPage = false; });
                grid.appendChild(div);
                
                if (pageData.status === 'pending') { const p = div.querySelector('.lazy-placeholder'); if(p && imageObserver) imageObserver.observe(p); }
            });
            document.getElementById('editor-page-count').innerText = editorPagesData.length;
        }

        async function loadPageThumbnail(idx, imgElement) {
            const data = editorPagesData[idx];
            if (!data || data.status === 'loaded') return;
            try {
                const fileObj = mergeFiles.find(f => f.id === data.fileId);
                if(!fileObj) return;
                const ab = await getFileArrayBuffer(fileObj);
                const loadingTask = pdfjsLib.getDocument({ data: ab.slice(0) });
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(data.pageIndex + 1);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                data.imgSrc = canvas.toDataURL();
                data.status = 'loaded';
                if (imgElement && imgElement.parentNode) imgElement.parentNode.innerHTML = `<img src="${data.imgSrc}" class="w-full h-full object-contain">`;
            } catch (e) { console.error("Thumbnail failed", e); }
        }

        function removePageInEditor(index) { editorPagesData.splice(index, 1); renderEditorGrid(); }

        async function handleSidebarFileDrop(fileId, insertAtIndex = -1) {
            const fileObj = mergeFiles.find(f => f.id === fileId);
            if (!fileObj) return;
            const loader = document.getElementById('editor-loading');
            loader.classList.remove('hidden');
            try {
                const ab = await getFileArrayBuffer(fileObj);
                const pdf = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
                const newPages = [];
                for (let i = 1; i <= pdf.numPages; i++) { newPages.push({ fileId: fileId, pageIndex: i - 1, imgSrc: null, status: 'pending' }); }
                if (insertAtIndex >= 0) editorPagesData.splice(insertAtIndex, 0, ...newPages);
                else editorPagesData.push(...newPages);
                renderEditorGrid();
                showToast(`已插入 ${pdf.numPages} 頁`);
            } catch(e) { alert("匯入失敗: " + e.message); } finally { loader.classList.add('hidden'); }
        }

        async function handleExternalFileDropInEditor(files, insertAtIndex = -1) {
            const loader = document.getElementById('editor-loading');
            loader.classList.remove('hidden');
            try {
                let hasPDF = false; const newItems = [];
                for (const file of files) {
                    if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) continue;
                    hasPDF = true;
                    const fileId = Date.now() + Math.random().toString(36).substr(2, 9);
                    let ab = await file.arrayBuffer();
                    let decryptedBlob = null;
                    try {
                        const pdfDoc = await smartLoadPdf(ab.slice(0));
                        if (pdfDoc.isEncrypted) {
                            const decryptedBytes = await pdfDoc.save();
                            ab = decryptedBytes.buffer;
                            decryptedBlob = new Blob([decryptedBytes], { type: 'application/pdf' });
                        }
                    } catch(e) { continue; } // Error handling simplified for brevity
                    const loadingTask = pdfjsLib.getDocument({ data: ab.slice(0) });
                    const pdf = await loadingTask.promise;
                    const p1 = await pdf.getPage(1);
                    const v = p1.getViewport({ scale: 0.3 });
                    const c = document.createElement('canvas'); c.width = v.width; c.height = v.height;
                    await p1.render({ canvasContext: c.getContext('2d'), viewport: v }).promise;
                    const fObj = { id: fileId, file: file, name: file.name, originalPageCount: pdf.numPages, pageIndices: Array.from({length: pdf.numPages},(_,k)=>k), thumbnail: c.toDataURL(), blob: decryptedBlob };
                    mergeFiles.push(fObj);
                    for(let i=0; i<pdf.numPages; i++) newItems.push({ fileId: fileId, pageIndex: i, imgSrc: null, status: 'pending' });
                }
                if (newItems.length > 0) {
                    if (insertAtIndex >= 0) editorPagesData.splice(insertAtIndex, 0, ...newItems);
                    else editorPagesData.push(...newItems);
                    renderEditorGrid(); renderSidebarList();
                }
            } catch(e) { console.error(e); } finally { loader.classList.add('hidden'); }
        }

        function renderSidebarList() {
            const sidebar = document.getElementById('sidebar-file-list');
            sidebar.innerHTML = '';
            const otherFiles = mergeFiles.filter(f => f.id !== currentEditingFileId);
            if (otherFiles.length === 0) { sidebar.innerHTML = '<div class="text-center text-slate-400 text-xs py-10 flex flex-col items-center"><i class="fas fa-inbox text-2xl mb-2 opacity-30"></i>無其他檔案</div>'; return; }
            otherFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = "sidebar-item bg-white p-2 rounded-lg flex items-center gap-3 transition cursor-grab group";
                item.draggable = true;
                item.innerHTML = `
                    <div class="text-slate-200 group-hover:text-indigo-400 transition-colors pl-1"><i class="fas fa-grip-vertical text-xs"></i></div>
                    <div class="w-8 h-10 bg-slate-50 border border-slate-200 flex-shrink-0 flex items-center justify-center relative overflow-hidden shadow-sm">
                        <div class="absolute top-0 right-0 w-2 h-2 bg-slate-100 border-l border-b border-slate-200 rounded-bl-sm"></div>
                        <img src="${file.thumbnail}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0 pointer-events-none">
                        <div class="text-xs font-bold text-slate-700 truncate leading-tight">${file.name}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">${file.pageIndices.length} 頁</div>
                    </div>
                `;
                item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('application/x-nuvex-file-id', file.id); e.dataTransfer.setData('application/x-nuvex-sort-id', file.id); e.dataTransfer.effectAllowed = 'copyMove'; item.style.opacity = '0.5'; });
                item.addEventListener('dragend', () => item.style.opacity = '1');
                sidebar.appendChild(item);
            });
        }

        async function saveEditorChanges() {
            const fileObj = mergeFiles.find(f => f.id === currentEditingFileId);
            if (!fileObj) return;
            const btn = document.getElementById('btn-save-editor');
            const ot = btn.innerHTML;
            btn.innerHTML = '<div class="loader mr-2 w-4 h-4 border-white border-t-white/30"></div> 處理中...'; btn.disabled = true;
            try {
                const { PDFDocument } = PDFLib;
                const newPdf = await PDFDocument.create();
                const loadedSourcePdfs = new Map();
                for (const pData of editorPagesData) {
                    let srcPdf = loadedSourcePdfs.get(pData.fileId);
                    if (!srcPdf) {
                        const sourceFileObj = mergeFiles.find(f => f.id === pData.fileId);
                        if (!sourceFileObj) continue; 
                        const ab = await getFileArrayBuffer(sourceFileObj);
                        srcPdf = await smartLoadPdf(ab);
                        loadedSourcePdfs.set(pData.fileId, srcPdf);
                    }
                    const [copiedPage] = await newPdf.copyPages(srcPdf, [pData.pageIndex]);
                    newPdf.addPage(copiedPage);
                }
                const pdfBytes = await newPdf.save();
                const newBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                fileObj.blob = newBlob; 
                fileObj.originalPageCount = editorPagesData.length;
                fileObj.pageIndices = Array.from({ length: editorPagesData.length }, (_, k) => k);
                if (editorPagesData.length > 0) fileObj.thumbnail = editorPagesData[0].imgSrc;
                
                showToast('變更已儲存');
                closeEditor(); 
                renderMergeList();
            } catch (err) { console.error(err); alert("儲存失敗：" + err.message); } finally { btn.innerHTML = ot; btn.disabled = false; }
        }

        function setupEditorDropZone() {
            const container = document.getElementById('page-editor-modal'); 
            const overlay = document.getElementById('editor-drop-overlay');
            container.addEventListener('dragenter', (e) => { if (e.dataTransfer.types.includes('Files')) { e.preventDefault(); editorDragCounter++; if (editorDragCounter===1) overlay.classList.remove('hidden'); } });
            container.addEventListener('dragleave', (e) => { if (e.dataTransfer.types.includes('Files')) { e.preventDefault(); editorDragCounter--; if (editorDragCounter<=0) { editorDragCounter=0; overlay.classList.add('hidden'); } } });
            container.addEventListener('dragover', (e) => { if (e.dataTransfer.types.includes('Files')) e.preventDefault(); });
            container.addEventListener('drop', async (e) => {
                if (e.dataTransfer.files?.length > 0) { e.preventDefault(); editorDragCounter=0; overlay.classList.add('hidden'); await handleExternalFileDropInEditor(e.dataTransfer.files); return; }
            });
        }

        function closeEditor() {
            const modal = document.getElementById('page-editor-modal');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('editor-drop-overlay').classList.add('hidden');
                editorDragCounter = 0; currentEditingFileId = null; editorPagesData = []; isDraggingPage = false; 
                if (imageObserver) imageObserver.disconnect();
                renderMergeList();
            }, 300);
        }

        function updateMergeBtnState() {
            const btn = document.getElementById('btn-merge');
            const hasFiles = mergeFiles.length > 0;
            if (!hasFiles) { 
                btn.disabled = true; 
                btn.classList.add('opacity-50', 'cursor-not-allowed', 'grayscale');
                document.getElementById('empty-state-hint').classList.remove('hidden');
            } else { 
                btn.disabled = false; 
                btn.classList.remove('opacity-50', 'cursor-not-allowed', 'grayscale'); 
                document.getElementById('empty-state-hint').classList.add('hidden');
            }
        }

        async function executeMerge() {
            if (mergeFiles.length < 1) return;
            const btn = document.getElementById('btn-merge'), ot = btn.innerHTML;
            btn.innerHTML = '<div class="loader mr-2 border-white border-t-white/30"></div> 處理中...'; btn.disabled = true;
            try {
                const { PDFDocument } = PDFLib;
                const mp = await PDFDocument.create();
                for (const it of mergeFiles) {
                    if (!it.pageIndices.length) continue;
                    const ab = await getFileArrayBuffer(it);
                    const p = await smartLoadPdf(ab);
                    const cp = await mp.copyPages(p, it.pageIndices); cp.forEach(x => mp.addPage(x));
                }
                const u = URL.createObjectURL(new Blob([await mp.save()], { type: 'application/pdf' }));
                const n = new Date(), pad = (n) => String(n).padStart(2, '0');
                const fn = `NuvexPDF_${n.getFullYear()}${pad(n.getMonth()+1)}${pad(n.getDate())}${pad(n.getHours())}${pad(n.getMinutes())}.pdf`;
                const dl = document.getElementById('merge-download'); dl.href = u; dl.download = fn;
                btn.classList.add('hidden'); dl.classList.remove('hidden');
                showToast('合併成功！請點擊下載');
            } catch (e) { alert(e.message || "合併失敗"); } 
            finally { if (document.getElementById('merge-download').classList.contains('hidden')) { btn.innerHTML = ot; btn.disabled = false; } }
        }

        function initAutoScroll() {
            const container = document.getElementById('modal-scroll-container');
            document.addEventListener('dragover', (e) => { if (isDraggingPage) currentMouseY = e.clientY; });
            function loop() {
                if (isDraggingPage) {
                    const rect = container.getBoundingClientRect();
                    if (currentMouseY > 0) {
                        if (currentMouseY < rect.top + 100) container.scrollTop -= 15;
                        else if (currentMouseY > rect.bottom - 100) container.scrollTop += 15;
                    }
                } scrollAnimationId = requestAnimationFrame(loop);
            } scrollAnimationId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
