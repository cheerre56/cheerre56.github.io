<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKGAME-街機領域</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           基礎與進場動畫
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #eaddcf; color: #111; font-family: 'VT323', 'Noto Sans TC', monospace; 
            overflow: hidden; width: 100vw; height: 100vh; -webkit-font-smoothing: antialiased; 
            user-select: none; -webkit-user-select: none;
            transition: background-color 0.6s ease; /* 背景色動態漸變 */
        }

        #intro-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; pointer-events: none;
            transform: scale(1); transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.3s ease-in-out;
        }

        #intro-top {
            font-family: 'Press Start 2P', cursive; color: #888; font-size: clamp(0.6rem, 2vw, 1rem); 
            margin-bottom: 20px; opacity: 0; transform: translateY(15px);
            animation: textFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) 0.1s forwards;
            transition: opacity 0.3s ease, transform 0.3s ease; 
        }

        #intro-slogan {
            font-family: 'Press Start 2P', cursive; line-height: 1.2; 
            font-size: clamp(3rem, 12vw, 6rem); letter-spacing: clamp(0.5rem, 2vw, 1rem); padding-left: clamp(0.5rem, 2vw, 1rem); 
            background: linear-gradient(180deg, #ffcc00 0%, #ff6600 50%, #ff0055 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(4px 4px 0px #111);
            opacity: 0; transform: translateY(20px);
            animation: textFadeIn 0.6s cubic-bezier(0.2, 0, 0, 1) 0.2s forwards; 
        }

        #intro-sub {
            font-family: 'Press Start 2P', cursive; color: #888; font-size: clamp(0.5rem, 1.5vw, 0.8rem); 
            margin-top: 20px; opacity: 0; transform: translateY(10px);
            animation: textFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) 0.3s forwards;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        @keyframes textFadeIn { to { opacity: 1; transform: translateY(0); } }
        .hide-text { opacity: 0 !important; transform: scale(0.8) !important; }
        .zoom-to-i { transform: scale(300) !important; filter: drop-shadow(0 0 0 transparent) !important; }
        .fade-out-wrapper { opacity: 0 !important; }

        #warp-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9998; background: #eaddcf; transition: opacity 0.5s ease;
        }

        /* =========================================
           主佈局：三頁式滾動系統 (Three-Page Scroll System)
           ========================================= */
        @keyframes bg-scroll { 0% { background-position: 0px 0px; } 100% { background-position: 30px 30px; } }

        #main-layout {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: transparent; background-image: radial-gradient(#ccc6b1 2px, transparent 2px); background-size: 30px 30px;
            z-index: 10; opacity: 0; 
            overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
            transition: opacity 0.6s ease;
            animation: bg-scroll 5s linear infinite; 
        }
        #main-layout.arrived { opacity: 1; }

        /* 場景背景色動態漸變 */
        body.page2-active { background-color: #1a1917; }
        body.gameover-active { background-color: #080004; } /* 死機深淵黑 */

        .page-section { position: relative; width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #page1 { justify-content: flex-start; }
        #page2 { justify-content: center; } 
        #page3 { justify-content: center; min-height: 120vh; } /* 碎裂緩衝頁 */

        .scroll-indicator {
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #888;
            text-align: center; margin-top: auto; margin-bottom: 20px; letter-spacing: 1px;
            animation: bounce 1.5s infinite ease-in-out; transition: opacity 0.3s;
        }
        #scrollIndicator2 { position: absolute; bottom: 30px; color: #555; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        /* --- 第一頁：Bento 網格系統 --- */
        .bento-grid { 
            width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px;
        }
        
        .retro-card { 
            background: #fff; border: 4px solid #111; border-radius: 16px; 
            padding: 30px; box-shadow: 8px 8px 0px #111; position: relative; 
        }

        .panel-left { display: flex; flex-direction: column; align-items: center; background: #ffe3e8; }
        .avatar-container {
            width: 130px; height: 130px; border-radius: 50%; background: #ffcc00; border: 4px solid #111; box-shadow: 6px 6px 0px #111;
            margin-bottom: 25px; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .nik-name { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; color: #111; margin-bottom: 35px; text-align: center; line-height: 1.5; }

        .social-btns { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; margin-top: auto; }
        .btn {
            width: 100%; padding: 15px 0; text-align: center; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; 
            text-decoration: none; border-radius: 8px; color: #111; border: 4px solid #111; box-shadow: 6px 6px 0px #111;
            transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .btn svg { width: 26px; height: 26px; }
        .btn:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #111; }
        .btn:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #111; }
        .btn-steam { background: #66c0f4; } .btn-discord { background: #7289da; color: #fff; } .btn-ig { background: #ff0055; color: #fff; }

        .panel-top { background: #e3f2fd; display: flex; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .welcome-text { font-family: 'Press Start 2P', cursive; font-size: clamp(1.2rem, 4vw, 2.5rem); color: #111; margin: 0; line-height: 1.5; }
        .blink-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .panel-bottom-placeholder { width: 100%; min-height: 480px; visibility: hidden; }

        /* =========================================
           獨立懸浮的遊戲面板 (Dynamic FLIP Panel)
           ========================================= */
        #gamePanel {
            position: fixed; z-index: 100;
            display: flex; flex-direction: column; background: #fff; overflow: hidden;
            will-change: top, left, width, height, transform;
        }

        /* 視窗化大畫面模式 (Arcade Window Style) */
        #gamePanel.fullscreen-mode { 
            background-color: #151518 !important; border-color: #ff0055 !important;
            box-shadow: 0px 0px 25px rgba(255, 0, 85, 0.3), 12px 12px 0px #111 !important;
        }
        #gamePanel.fullscreen-mode .game-top-bar { background-color: #222; padding: 12px 18px; border-radius: 12px; border: 3px solid #111;}
        #gamePanel.fullscreen-mode .game-tab { background: #333; color: #888; border-color: #111; box-shadow: 3px 3px 0px #111; }
        #gamePanel.fullscreen-mode .game-tab:hover { background: #444; }
        #gamePanel.fullscreen-mode .game-tab.active { background: #ff0055; color: #fff; box-shadow: 0px 0px 0px #111; }
        #gamePanel.fullscreen-mode .mode-btn { border-color: #111; box-shadow: 3px 3px 0px #111; }
        #gamePanel.fullscreen-mode .score-display { background: #111; border-color: #111; color: #fff; box-shadow: 3px 3px 0px #111;}
        #gamePanel.fullscreen-mode .score-val { color: #39ff14; }
        #gamePanel.fullscreen-mode .game-instructions { background: #222; border-color: #111; color: #00f0ff; border-style: solid; }
        
        .back-to-grid-btn {
            font-family: 'Press Start 2P', cursive; font-size: 0.5rem; color: #fff; background: #111;
            border: 2px solid #ff0055; padding: 10px 12px; border-radius: 6px; cursor: pointer;
            display: none; box-shadow: 3px 3px 0px #000; transition: all 0.1s;
        }
        .back-to-grid-btn:hover { background: #ff0055; }
        .back-to-grid-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        #gamePanel.fullscreen-mode .back-to-grid-btn { display: inline-block; }

        .game-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 15px; flex-wrap: wrap; width: 100%; transition: all 0.3s;}
        .game-tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .game-tab { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; background: #f0f0f0; color: #555; border: 3px solid #111; padding: 10px 12px; border-radius: 6px; cursor: pointer; box-shadow: 3px 3px 0px #111; transition: all 0.1s; text-align: center; }
        .game-tab.active { background: #ff0055; color: #fff; box-shadow: 0px 0px 0px #111; transform: translate(3px, 3px); }
        .game-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .mode-btn { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; background: #ffcc00; color: #111; border: 3px solid #111; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.1s; box-shadow: 3px 3px 0px #111; }
        .mode-btn.manual { background: #39ff14; }
        .score-display { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #111; display: flex; align-items: center; gap: 8px; background: #fff; border: 3px solid #111; padding: 10px 12px; border-radius: 6px; box-shadow: 3px 3px 0px #111; transition: all 0.3s;}
        .score-val { color: #ff0055; font-size: 0.7rem; transition: text-shadow 0.1s, color 0.1s; font-weight: bold;}
        .score-val.flash { color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }

        .canvas-container { flex: 1; width: 100%; background: #111; position: relative; touch-action: none; min-height: 250px; display: flex; justify-content: center; align-items: center; border: 4px solid #111; border-radius: 8px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); transition: border 0.3s;}
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }

        .game-instructions { margin-top: 15px; padding: 12px; font-family: 'VT323', monospace; font-size: 1.2rem; color: #555; text-align: center; border-radius: 8px; background: #f0f0f0; border: 2px dashed #ccc; transition: all 0.3s;}

        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00f0ff; font-family: 'Press Start 2P', cursive; }
        .progress-bar { width: 60%; height: 20px; border: 3px solid #fff; background: #111; padding: 2px; margin-top: 15px;}
        .progress-fill { width: 0%; height: 100%; background: #ff0055; }

        /* =========================================
           碎裂特效與 GAME OVER 畫面
           ========================================= */
        #shatterContainer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 150; pointer-events: none; overflow: hidden; display: none;
        }
        .canvas-shard, .panel-shard {
            position: absolute; background-repeat: no-repeat;
            /* 物理彈射過場動畫 */
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.5s ease-in;
        }
        .panel-shard { background-color: #151518; border: 2px solid #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        #gameOverScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 900; pointer-events: none; opacity: 0; transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #gameOverScreen.show { opacity: 1; transform: scale(1); pointer-events: auto; }
        
        /* 復古掃描線遮罩 */
        #gameOverScreen::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 901; pointer-events: none;
        }

        #gameOverScreen h1 {
            font-family: 'Press Start 2P', cursive; font-size: clamp(3rem, 8vw, 7rem);
            color: #ff0055; text-shadow: 6px 6px 0px #111, 0 0 30px rgba(255,0,85,0.8);
            text-align: center; letter-spacing: 5px; animation: glitch 2s infinite; z-index: 902;
        }
        #gameOverScreen p {
            font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: #fff;
            margin-top: 30px; animation: blink 1.5s infinite; z-index: 902;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @media (min-width: 900px) {
            .page-section { padding: 40px; }
            .bento-grid { grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; gap: 30px; height: 85vh; padding: 0; }
            .panel-left { grid-column: 1 / 2; grid-row: 1 / 3; padding: 40px; justify-content: flex-start;}
            .avatar-container { width: 140px; height: 140px; border-width: 4px; box-shadow: 6px 6px 0px #111; margin-bottom: 25px;}
            .social-btns { flex-direction: column; width: 100%; gap: 20px; margin-top: auto;}
            .panel-top { grid-column: 2 / 3; grid-row: 1 / 2; }
            .panel-bottom-placeholder { grid-column: 2 / 3; grid-row: 2 / 3; min-height: unset; height: 100%; }
            
            .game-top-bar { flex-wrap: nowrap; margin-bottom: 20px; }
            .game-tab { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .mode-btn { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .score-display { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .score-val { font-size: 0.9rem; }
            .game-instructions { font-size: 1.4rem; padding: 15px; }
        }
    </style>
</head>

    <script>
        // ==========================================
        // 1. 進場動畫 
        // ==========================================
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        const introWrapper = document.getElementById('intro-wrapper');
        const mainLayout = document.getElementById('main-layout');

        let width, height, centerX, centerY, warpParticles = [], speed = 0.5, maxSpeed = 35, isAccelerating = false, aniId;

        function resizeWarp() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr); centerX = width / 2; centerY = height / 2;
        }
        window.addEventListener('resize', resizeWarp); resizeWarp();

        class WarpParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2;
                this.z = Math.random() * width; this.pz = this.z; this.alpha = Math.random() * 0.8 + 0.2; this.thickness = Math.random() * 2 + 1; 
            }
            update() { this.z -= speed; if (this.z < 1) { this.z = width; this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2; this.pz = this.z; } }
            draw() {
                const fov = 300, sx = (this.x / this.z) * fov + centerX, sy = (this.y / this.z) * fov + centerY;

            }
        }

        function animateWarp() {

            aniId = requestAnimationFrame(animateWarp);
        }
        animateWarp();

        // ==========================================
        // 2. 懸浮面板佈局與 雙向滾動 FLIP 視窗控制
        // ==========================================
        const placeholder = document.getElementById('gamePlaceholder');
        const gamePanel = document.getElementById('gamePanel');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const scrollIndicator2 = document.getElementById('scrollIndicator2');
        const shatterContainer = document.getElementById('shatterContainer');
        const gameOverScreen = document.getElementById('gameOverScreen');
        
        let panelState = 'GRID'; // GRID, EXPANDING, FULLSCREEN, SHRINKING, GAMEOVER
        
        function syncPanelPosition() {
            const rect = placeholder.getBoundingClientRect();
            gamePanel.style.top = rect.top + 'px';
            gamePanel.style.left = rect.left + 'px';
            gamePanel.style.width = rect.width + 'px';

        // --- 核心：DOM 碎裂引擎 ---
        function triggerShatter() {
            if(panelState === 'GAMEOVER') return;
            panelState = 'GAMEOVER';
            
            GameEngine.stopCurrent(); // 暫停遊戲

            const panelRect = gamePanel.getBoundingClientRect();
            const canvasRect = GameEngine.gCanvas.getBoundingClientRect();
            
            if(canvasRect.width > 0 && canvasRect.height > 0) {
                const dataUrl = GameEngine.gCanvas.toDataURL(); // 擷取畫布殘影
                shatterContainer.innerHTML = '';
                shatterContainer.style.display = 'block';
                
                // 產生約 80 塊的玻璃碎片
                const rows = Math.max(1, Math.floor(canvasRect.height / 80));
                const cols = Math.max(1, Math.floor(canvasRect.width / 80));
                const shardW = canvasRect.width / cols;
                const shardH = canvasRect.height / rows;
                
                // 1. 畫布碎片
                for(let i=0; i<rows; i++) {
                    for(let j=0; j<cols; j++) {
                        let shard = document.createElement('div');
                        shard.className = 'canvas-shard';
                        shard.style.width = shardW + 'px'; shard.style.height = shardH + 'px';
                        shard.style.left = (canvasRect.left + j*shardW) + 'px';
                        shard.style.top = (canvasRect.top + i*shardH) + 'px';
                        shard.style.backgroundImage = `url(${dataUrl})`;
                        shard.style.backgroundPosition = `-${j*shardW}px -${i*shardH}px`;
                        shard.style.backgroundSize = `${canvasRect.width}px ${canvasRect.height}px`;
                        shatterContainer.appendChild(shard);
                        
                        // 套用炸開動畫
                        setTimeout(() => {
                            const angle = Math.random() * Math.PI * 2;
                            const dist = Math.random() * window.innerWidth * 0.6 + 100;
                            const tx = Math.cos(angle) * dist;
                            const ty = Math.sin(angle) * dist + window.innerHeight * 0.3; // 向下重力偏移
                            const rot = (Math.random() - 0.5) * 720;
                            shard.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(${Math.random()*0.5 + 0.5})`;
                            shard.style.opacity = '0';
                        }, 20);
                    }
                }
                
                // 2. 邊框與控制列的暗色碎片
                for(let k=0; k<15; k++) {
                    let pShard = document.createElement('div');
                    pShard.className = 'panel-shard';
                    pShard.style.width = (Math.random() * 100 + 50) + 'px';
                    pShard.style.height = (Math.random() * 100 + 50) + 'px';
                    pShard.style.left = (panelRect.left + Math.random() * panelRect.width) + 'px';
                    pShard.style.top = (panelRect.top + Math.random() * panelRect.height) + 'px';
                    pShard.style.backgroundColor = Math.random() > 0.8 ? '#ff0055' : '#151518';
                    shatterContainer.appendChild(pShard);
                    
                    setTimeout(() => {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * window.innerWidth * 0.8;
                        const tx = Math.cos(angle) * dist; const ty = Math.sin(angle) * dist + 200;
                        const rot = (Math.random() - 0.5) * 1080;
                        pShard.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
                        pShard.style.opacity = '0';
                    }, 20);
                }
            }
            
            // 隱藏真身並觸發死機黑屏
            gamePanel.style.opacity = '0';
            gamePanel.style.pointerEvents = 'none';
            gameOverScreen.classList.add('show');
            document.body.classList.add('gameover-active');
            scrollIndicator2.style.opacity = '0';
        }

        // 碎裂還原 (重生)
        function restoreFromShatter() {
            gameOverScreen.classList.remove('show');
            document.body.classList.remove('gameover-active');
            shatterContainer.style.display = 'none';
            shatterContainer.innerHTML = '';
            scrollIndicator2.style.opacity = '1';
            
            gamePanel.style.opacity = '1';
            gamePanel.style.pointerEvents = 'auto';
            
            GameEngine.reset();
            GameEngine.startGame();
        }

        // 三頁式滾動監聽核心
        mainLayout.addEventListener('scroll', () => {
            const page2Top = document.getElementById('page2').getBoundingClientRect().top;
            const page3Top = document.getElementById('page3').getBoundingClientRect().top;
            const threshold = window.innerHeight * 0.45; 
            
            // 判定當前目標狀態
            let targetState = 'GRID';
            if (page3Top < threshold) targetState = 'GAMEOVER';
            else if (page2Top < threshold) targetState = 'FULLSCREEN';
            
            // 狀態過場邏輯
            if (panelState !== targetState) {
                // 如果從死機狀態回來，先瞬間重組面板
                if (panelState === 'GAMEOVER') {
                    restoreFromShatter();
                    panelState = 'RESTORED'; 
                }
                
                if (targetState === 'GAMEOVER') {
                    triggerShatter();
                } else if (targetState === 'FULLSCREEN') {
                    expandToFullscreen();
                } else if (targetState === 'GRID') {
                    shrinkToGrid();
                }
            } else if (panelState === 'GRID' || panelState === 'SHRINKING') {
                syncPanelPosition(); 
            }
        });

        // 綁定返回按鈕
        document.getElementById('backToGridBtn').addEventListener('click', () => {
            mainLayout.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('resize', () => {
            if(panelState === 'GRID' || panelState === 'SHRINKING') syncPanelPosition();
            else if(panelState === 'FULLSCREEN') expandToFullscreen();
        });

        function simulateLoading() {
            syncPanelPosition();
            gamePanel.style.opacity = '1';
            let progress = 0;
            const progressEl = document.getElementById('load-progress'), fillEl = document.getElementById('load-fill'), overlay = document.getElementById('loading-overlay'), modeBtn = document.getElementById('modeBtn');
            const loadInt = setInterval(() => {
                progress += Math.floor(Math.random() * 25) + 15;
                if (progress >= 100) {
                    progress = 100; clearInterval(loadInt); progressEl.innerText = progress; fillEl.style.width = progress + '%';
                    setTimeout(() => { overlay.style.display = 'none'; modeBtn.style.display = 'block'; gamePanel.style.pointerEvents = 'auto'; GameEngine.init(); }, 400); 
                } else { progressEl.innerText = progress; fillEl.style.width = progress + '%'; }
            }, 80);
        }

        // ==========================================
        // 3. 主控引擎 (含動態邊界響應)
        // ==========================================
        const GameEngine = {
            activeGame: 'pacman', isAutoMode: true, score: 0, gCanvas: null, gCtx: null, rectW: 0, rectH: 0, reqId: null,
            input: { dx: 1, dy: 0, left: false, right: false, mouseX: null },

            init() {
                this.gCanvas = document.getElementById('gameCanvas'); this.gCtx = this.gCanvas.getContext('2d');
                this.bindEvents(); 
                const container = document.getElementById('canvasContainer');
                const rect = container.getBoundingClientRect();
                this.rectW = rect.width; this.rectH = rect.height;
                const dpr = window.devicePixelRatio || 1;
                this.gCanvas.width = rect.width * dpr; this.gCanvas.height = rect.height * dpr; 
                this.gCtx.scale(dpr, dpr);
                this.setupResizeObserver(); this.startGame();
            },

            updateInstructions() {
                const instEl = document.getElementById('gameInstructions');
                if (this.isAutoMode) { instEl.style.color = 'inherit'; instEl.innerText = ">> AI 自動掛機中。點擊 MANUAL 即可親自遊玩。"; } 
                else {
                    instEl.style.color = '#ff0055';
                    if (this.activeGame === 'pacman' || this.activeGame === 'snake') instEl.innerText = "[操作] 鍵盤方向鍵，或「點擊/滑動」畫面控制方向。";
                    else if (this.activeGame === 'shooter') instEl.innerText = "[操作] 鍵盤左右鍵，或「按住滑動」畫面移動戰機。";
                }
            },

            setupResizeObserver() {
                const container = document.getElementById('canvasContainer');
                new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const rect = entry.contentRect;
                        if (rect.width > 0 && rect.height > 0) {
                            if (Math.abs(this.rectW - rect.width) > 1 || Math.abs(this.rectH - rect.height) > 1) {
                                this.rectW = rect.width; this.rectH = rect.height;
                                const dpr = window.devicePixelRatio || 1;
                                this.gCanvas.width = rect.width * dpr; this.gCanvas.height = rect.height * dpr; 
                                this.gCtx.scale(dpr, dpr); 
                                if(this.activeGame === 'pacman') PacmanGame.updateBounds();
                                else if(this.activeGame === 'snake') SnakeGame.updateBounds();
                                else if(this.activeGame === 'shooter') ShooterGame.updateBounds();
                            }
                        }
                    }
                }).observe(container);
            },

            bindEvents() {
                const modeBtn = document.getElementById('modeBtn'), container = document.getElementById('canvasContainer');
                const tabs = document.querySelectorAll('.game-tab');

                modeBtn.addEventListener('click', () => {
                    this.isAutoMode = !this.isAutoMode; modeBtn.innerText = this.isAutoMode ? "AI MODE" : "MANUAL";
                    this.isAutoMode ? modeBtn.classList.remove('manual') : modeBtn.classList.add('manual'); this.updateInstructions();
                });

                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        if(tab.classList.contains('active')) return;
                        tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active');
                        this.activeGame = tab.getAttribute('data-game'); this.stopCurrent(); this.startGame();
                    });
                });

                window.addEventListener('keydown', e => {
                    if (this.isAutoMode) return;
                    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
                    if (this.activeGame === 'pacman' || this.activeGame === 'snake') {
                        if (e.key === 'ArrowUp' && this.input.dy !== 1) { this.input.dx = 0; this.input.dy = -1; }
                        if (e.key === 'ArrowDown' && this.input.dy !== -1) { this.input.dx = 0; this.input.dy = 1; }
                        if (e.key === 'ArrowLeft' && this.input.dx !== 1) { this.input.dx = -1; this.input.dy = 0; }
                        if (e.key === 'ArrowRight' && this.input.dx !== -1) { this.input.dx = 1; this.input.dy = 0; }
                    } else if (this.activeGame === 'shooter') {
                        if (e.key === 'ArrowLeft') this.input.left = true; if (e.key === 'ArrowRight') this.input.right = true;
                    }
                });
                window.addEventListener('keyup', e => {
                    if (this.activeGame === 'shooter') { if (e.key === 'ArrowLeft') this.input.left = false; if (e.key === 'ArrowRight') this.input.right = false; }
                });

                const handlePointer = (clientX, clientY) => {
                    if (this.isAutoMode) return;
                    const rect = this.gCanvas.getBoundingClientRect();
                    const clickX = clientX - rect.left; const clickY = clientY - rect.top;
                    if (this.activeGame === 'shooter') { this.input.mouseX = clickX; } 
                    else {
                        const midX = rect.width / 2, midY = rect.height / 2;
                        if (Math.abs(clickX - midX) > Math.abs(clickY - midY)) {
                            if (clickX > midX && this.input.dx !== -1) { this.input.dx = 1; this.input.dy = 0; }
                            else if (clickX < midX && this.input.dx !== 1) { this.input.dx = -1; this.input.dy = 0; }
                        } else {
                            if (clickY > midY && this.input.dy !== -1) { this.input.dx = 0; this.input.dy = 1; }
                            else if (clickY < midY && this.input.dy !== 1) { this.input.dx = 0; this.input.dy = -1; }
                        }
                    }
                };
                this.gCanvas.addEventListener('mousedown', e => handlePointer(e.clientX, e.clientY));
                this.gCanvas.addEventListener('mousemove', e => { if(e.buttons > 0) handlePointer(e.clientX, e.clientY); });
                this.gCanvas.addEventListener('mouseup', () => this.input.mouseX = null);
                this.gCanvas.addEventListener('touchstart', e => handlePointer(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
                this.gCanvas.addEventListener('touchmove', e => { e.preventDefault(); handlePointer(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
                this.gCanvas.addEventListener('touchend', () => this.input.mouseX = null);
            },

            addScore(pts) {
                this.score += pts; const scoreEl = document.getElementById('score'); scoreEl.innerText = this.score;
                scoreEl.classList.add('flash'); setTimeout(() => scoreEl.classList.remove('flash'), 100); 
            },
            reset() { this.score = 0; document.getElementById('score').innerText = 0; this.input = { dx: 1, dy: 0, left: false, right: false, mouseX: null }; },
            stopCurrent() { cancelAnimationFrame(this.reqId); this.reset(); },
            startGame() { this.updateInstructions(); if (this.activeGame === 'pacman') PacmanGame.start(this); else if (this.activeGame === 'shooter') ShooterGame.start(this); else if (this.activeGame === 'snake') SnakeGame.start(this); }
        };

        // ==========================================
        // 遊戲 A：PAC-MAN
        // ==========================================
        const PacmanGame = {
            engine: null, grid: 24, cols: 0, rows: 0, offsetX: 0, offsetY: 0, pacman: {}, dots: [], ghosts: [], particles: [], popups: [], trail: [], shake: 0, lastTick: 0,
            start(engine) {
                this.engine = engine; this.updateBounds(); this.reset(); this.loop = this.loop.bind(this); this.engine.reqId = requestAnimationFrame(this.loop);
            },
            updateBounds() {
                if(!this.engine || this.engine.rectW === 0) return;
                this.grid = Math.max(22, Math.floor(this.engine.rectW / 24));
                this.cols = Math.floor(this.engine.rectW / this.grid); this.rows = Math.floor(this.engine.rectH / this.grid);
                this.offsetX = (this.engine.rectW - this.cols * this.grid) / 2; this.offsetY = (this.engine.rectH - this.rows * this.grid) / 2;
            },
            reset() {
                if(this.cols < 3) return;
                this.pacman = { x: Math.floor(this.cols/2), y: Math.floor(this.rows/2), mouth: 0, mouthDir: 0.03 };
                this.dots = []; this.particles = []; this.popups = []; this.trail = []; this.shake = 0;
                if(this.engine) this.engine.reset();
                for(let i=0; i<3; i++) this.dots.push(this.spawnObj());
                this.ghosts = [{ x: 1, y: 1, dx: 1, dy: 0, color: '#ff0055' }, { x: this.cols-2, y: this.rows-2, dx: 0, dy: -1, color: '#00f0ff' }];
            },
            spawnObj() {
                let v = false, o = {x:0, y:0};
                while(!v) { o = { x: Math.floor(Math.random() * this.cols), y: Math.floor(Math.random() * this.rows) }; v = !(o.x===this.pacman.x && o.y===this.pacman.y) && !this.dots.some(d=>d.x===o.x && d.y===o.y); }
                return o;
            },
            aiMove() {
                let moves = [{dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1}];
                moves = moves.filter(m => !(m.dx === -this.engine.input.dx && m.dy === -this.engine.input.dy));
                let safe = moves.filter(m => { let nx = (this.pacman.x + m.dx + this.cols) % this.cols, ny = (this.pacman.y + m.dy + this.rows) % this.rows; return !this.ghosts.some(g => Math.abs(nx-g.x)+Math.abs(ny-g.y) <= 1); });
                if(safe.length > 0) {
                    let best = safe[0], minD = Infinity;
                    safe.forEach(m => {
                        let nx = (this.pacman.x + m.dx + this.cols) % this.cols, ny = (this.pacman.y + m.dy + this.rows) % this.rows;
                        this.dots.forEach(d => { let dist = Math.abs(nx-d.x)+Math.abs(ny-d.y); if(dist < minD) { minD = dist; best = m; } });
                    });
                    this.engine.input.dx = best.dx; this.engine.input.dy = best.dy;
                }
            },
            spawnParts(x, y, color) { for(let i=0; i<15; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: color }); },
            loop(time) {
                this.engine.reqId = requestAnimationFrame(this.loop); if(this.cols < 3) return;
                if (time - this.lastTick >= 140) {
                    if (this.shake === 0) {
                        if (this.engine.isAutoMode) this.aiMove();
                        this.trail.push({x: this.pacman.x, y: this.pacman.y, alpha: 0.5}); if (this.trail.length > 4) this.trail.shift();
                        this.pacman.x = (this.pacman.x + this.engine.input.dx + this.cols) % this.cols; this.pacman.y = (this.pacman.y + this.engine.input.dy + this.rows) % this.rows;
                        this.ghosts.forEach(g => {
                            let ms = [{dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1}];
                            if(Math.random() < 0.15) { let rm = ms[Math.floor(Math.random()*ms.length)]; if(!(rm.dx===-g.dx && rm.dy===-g.dy)) { g.dx=rm.dx; g.dy=rm.dy; } }
                            g.x = (g.x + g.dx + this.cols) % this.cols; g.y = (g.y + g.dy + this.rows) % this.rows;
                        });
                        if (this.ghosts.some(g => g.x === this.pacman.x && g.y === this.pacman.y)) {
                            this.shake = 12; this.spawnParts(this.pacman.x*this.grid+this.grid/2, this.pacman.y*this.grid+this.grid/2, '#ffcc00'); setTimeout(()=>this.reset(), 600);
                        } else {
                            let ate = this.dots.findIndex(d => d.x === this.pacman.x && d.y === this.pacman.y);
                            if (ate !== -1) {
                                this.engine.addScore(10); let e = this.dots.splice(ate, 1)[0];
                                this.popups.push({x: e.x*this.grid+this.grid/2, y: e.y*this.grid, text: '+10', alpha: 1}); this.dots.push(this.spawnObj());
                                this.spawnParts(e.x*this.grid+this.grid/2, e.y*this.grid+this.grid/2, '#fff');
                            }
                        }
                    }
                    this.lastTick = time;
                }
                const ctx = this.engine.gCtx; ctx.fillStyle = '#111'; ctx.fillRect(0, 0, this.engine.rectW, this.engine.rectH);
                ctx.save(); if(this.shake > 0) { ctx.translate((Math.random()-0.5)*12, (Math.random()-0.5)*12); this.shake--; }
                ctx.translate(this.offsetX, this.offsetY);
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, this.cols * this.grid, this.rows * this.grid);
                this.trail.forEach(t => { t.alpha -= 0.02; if(t.alpha > 0) { ctx.fillStyle = `rgba(255, 204, 0, ${t.alpha})`; ctx.beginPath(); ctx.arc(t.x*this.grid+this.grid/2, t.y*this.grid+this.grid/2, this.grid/3, 0, Math.PI*2); ctx.fill(); } });
                ctx.fillStyle = '#fff'; this.dots.forEach(d => { ctx.fillRect(d.x*this.grid + this.grid/2 -3, d.y*this.grid + this.grid/2 -3, 6, 6); });
                this.ghosts.forEach(g => { let gx = g.x*this.grid+this.grid/2, gy = g.y*this.grid+this.grid/2, r = this.grid/2-2; ctx.fillStyle = g.color; ctx.beginPath(); ctx.arc(gx, gy, r, Math.PI, 0); ctx.lineTo(gx+r, gy+r); ctx.lineTo(gx-r, gy+r); ctx.fill(); });
                if(this.shake === 0) {
                    let px = this.pacman.x*this.grid+this.grid/2, py = this.pacman.y*this.grid+this.grid/2, ang = 0;
                    if(this.engine.input.dx===-1) ang=Math.PI; if(this.engine.input.dy===1) ang=Math.PI/2; if(this.engine.input.dy===-1) ang=-Math.PI/2;
                    this.pacman.mouth += this.pacman.mouthDir; if(this.pacman.mouth>0.25 || this.pacman.mouth<0) this.pacman.mouthDir*=-1;
                    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(px, py, this.grid/2-2, ang+this.pacman.mouth*Math.PI, ang+(2-this.pacman.mouth)*Math.PI); ctx.lineTo(px, py); ctx.fill();
                }
                ctx.font = "12px 'Press Start 2P'"; this.popups.forEach((p, i) => { p.y -= 0.5; p.alpha -= 0.02; if(p.alpha<=0) { this.popups.splice(i, 1); return;} ctx.fillStyle = `rgba(255,204,0,${p.alpha})`; ctx.fillText(p.text, p.x-10, p.y); });
                for(let i = this.particles.length-1; i>=0; i--) { let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if(p.life <= 0) { this.particles.splice(i, 1); continue; } ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1; }
                ctx.restore();
            }
        };

        // ==========================================
        // 遊戲 B：Space Shooter
        // ==========================================
        const ShooterGame = {
            engine: null, player: {}, bullets: [], enemies: [], stars: [], shake: 0, enemyTimer: 0, frame: 0, particles: [], popups: [],
            start(engine) { this.engine = engine; this.updateBounds(); this.reset(); this.loop = this.loop.bind(this); this.engine.reqId = requestAnimationFrame(this.loop); },
            updateBounds() { if(!this.engine || this.engine.rectW === 0) return; if(this.player.x > this.engine.rectW - this.player.w) this.player.x = this.engine.rectW - this.player.w; },
            reset() {
                let w = this.engine.rectW, h = this.engine.rectH;
                this.player = { x: w/2 - 15, y: h - 60, w: 30, h: 30, cooldown: 0 };
                this.bullets = []; this.enemies = []; this.shake = 0; this.enemyTimer = 0; this.frame = 0; this.stars = []; this.particles = []; this.popups = [];
                if(this.engine) this.engine.reset();
                for(let i=0; i<40; i++) this.stars.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*2+1});
            },
            spawnParts(x, y, color, speedScale=1) { for(let i=0; i<20; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*10*speedScale, vy: (Math.random()-0.5)*10*speedScale, life: 1, c: color }); },
            loop() {
                this.engine.reqId = requestAnimationFrame(this.loop); let w = this.engine.rectW, h = this.engine.rectH; const ctx = this.engine.gCtx; this.frame++;
                if (this.shake === 0) {
                    if (this.engine.isAutoMode) {
                        let targetX = w/2; if (this.enemies.length > 0) { let lowest = this.enemies.reduce((a,b) => a.y > b.y ? a : b); targetX = lowest.x + lowest.w/2; }
                        this.player.x += (targetX - (this.player.x + this.player.w/2)) * 0.12;
                    } else {
                        if (this.engine.input.mouseX !== null) this.player.x += (this.engine.input.mouseX - (this.player.x + this.player.w/2)) * 0.25;
                        else { if (this.engine.input.left) this.player.x -= 6; if (this.engine.input.right) this.player.x += 6; }
                    }
                    if (this.player.cooldown <= 0) { this.bullets.push({x: this.player.x + this.player.w/2 - 2, y: this.player.y, vy: -12}); this.player.cooldown = 10; }
                    this.player.cooldown--; if (this.player.x < 0) this.player.x = 0; if (this.player.x > w - this.player.w) this.player.x = w - this.player.w;
                    this.enemyTimer--; if (this.enemyTimer <= 0) { this.enemies.push({x: Math.random()*(w-30), y: -30, w: 30, h: 30, vy: 4.5 }); this.enemyTimer = 40; }
                }
                for(let i = this.bullets.length-1; i>=0; i--) {
                    let b = this.bullets[i]; b.y += b.vy; if(b.y < -10) { this.bullets.splice(i, 1); continue; }
                    for(let j = this.enemies.length-1; j>=0; j--) {
                        let e = this.enemies[j];
                        if (b.x < e.x + e.w && b.x + 4 > e.x && b.y < e.y + e.h && b.y + 10 > e.y) {
                            this.engine.addScore(20); this.spawnParts(e.x+e.w/2, e.y+e.h/2, '#ffcc00', 1.2); 
                            this.popups.push({x: e.x, y: e.y, text: '+20', alpha: 1}); this.enemies.splice(j, 1); this.bullets.splice(i, 1); break; 
                        }
                    }
                }
                for(let i = this.enemies.length-1; i>=0; i--) {
                    let e = this.enemies[i]; e.y += e.vy;
                    if (e.x < this.player.x + this.player.w && e.x + e.w > this.player.x && e.y < this.player.y + this.player.h && e.y + e.h > this.player.y) { this.shake = 15; this.spawnParts(this.player.x+this.player.w/2, this.player.y+this.player.h/2, '#ff0055', 1.5); setTimeout(() => this.reset(), 700); }
                    if(e.y > h) this.enemies.splice(i, 1); 
                }
                ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, w, h); ctx.save();
                if(this.shake > 0) { ctx.translate((Math.random()-0.5)*15, (Math.random()-0.5)*15); this.shake--; }
                ctx.strokeStyle = 'rgba(255, 0, 85, 0.4)'; ctx.lineWidth = 4; ctx.strokeRect(2, 2, w-4, h-4);
                ctx.fillStyle = '#fff'; this.stars.forEach(s => { s.y += s.s; if(s.y > h) s.y = 0; ctx.fillRect(s.x, s.y, s.s, s.s); });
                ctx.fillStyle = '#ffcc00'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffcc00'; this.bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 12));
                ctx.shadowColor = '#ff0055'; this.enemies.forEach(e => { ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.moveTo(e.x+e.w/2, e.y+e.h); ctx.lineTo(e.x, e.y); ctx.lineTo(e.x+e.w, e.y); ctx.fill(); ctx.fillStyle = '#fff'; ctx.fillRect(e.x+e.w/2-4, e.y+5, 8, 8); });
                if (this.shake === 0) { ctx.shadowColor = '#00f0ff'; ctx.fillStyle = '#00f0ff'; ctx.beginPath(); ctx.moveTo(this.player.x+this.player.w/2, this.player.y); ctx.lineTo(this.player.x, this.player.y+this.player.h); ctx.lineTo(this.player.x+this.player.w, this.player.y+this.player.h); ctx.fill(); ctx.fillStyle = (this.frame % 4 < 2) ? '#ff0055' : '#ffcc00'; ctx.fillRect(this.player.x+this.player.w/2-4, this.player.y+this.player.h, 8, 10); }
                ctx.shadowBlur = 0;
                for(let i = this.particles.length-1; i>=0; i--) { let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if(p.life <= 0) { this.particles.splice(i, 1); continue; } ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1; }
                ctx.font = "14px 'Press Start 2P'";
                for(let i = this.popups.length-1; i>=0; i--) { let p = this.popups[i]; p.y -= 1; p.alpha -= 0.03; if(p.alpha <= 0) { this.popups.splice(i, 1); continue; } ctx.fillStyle = `rgba(255, 0, 85, ${p.alpha})`; ctx.fillText(p.text, p.x-10, p.y); }
                ctx.restore();
            }
        };

        // ==========================================
        // 遊戲 C：SNAKE
        // ==========================================
        const SnakeGame = {
            engine: null, grid: 16, cols: 0, rows: 0, offsetX: 0, offsetY: 0, snake: [], foods: [], shake: 0, lastTick: 0, particles: [], popups: [],
            start(engine) {
                this.engine = engine; this.updateBounds();
                this.reset(); this.loop = this.loop.bind(this); this.engine.reqId = requestAnimationFrame(this.loop);
            },
            updateBounds() {
                if(!this.engine || this.engine.rectW === 0) return;
                this.grid = 16; this.cols = Math.floor(this.engine.rectW / this.grid); this.rows = Math.floor(this.engine.rectH / this.grid);
                this.offsetX = (this.engine.rectW - this.cols * this.grid) / 2; this.offsetY = (this.engine.rectH - this.rows * this.grid) / 2;
            },
            reset() {
                if(this.cols < 5) return;
                let midX = Math.floor(this.cols/2), midY = Math.floor(this.rows/2);
                this.snake = [{x: midX, y: midY}, {x: midX-1, y: midY}, {x: midX-2, y: midY}];
                this.foods = []; this.particles = []; this.popups = []; this.shake = 0;
                if (this.engine) { this.engine.reset(); }
                for(let i=0; i<3; i++) this.foods.push(this.spawnFood());
            },
            spawnFood() {
                let v = false, f = {};
                while(!v) { f = { x: Math.floor(Math.random() * this.cols), y: Math.floor(Math.random() * this.rows) }; v = !this.snake.some(s=>s.x===f.x && s.y===f.y) && !this.foods.some(fd=>fd.x===f.x && fd.y===f.y); }
                return f;
            },
            spawnParts(x, y, color) { for(let i=0; i<15; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: color }); },
            aiMove() {
                const head = this.snake[0]; let moves = [{dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1}];
                moves = moves.filter(m => !(m.dx === -this.engine.input.dx && m.dy === -this.engine.input.dy));
                let safeMoves = moves.filter(m => {
                    let nx = head.x + m.dx, ny = head.y + m.y;
                    let hitWall = nx < 0 || nx >= this.cols || ny < 0 || ny >= this.rows;
                    let hitSelf = this.snake.some((s, i) => i !== this.snake.length-1 && s.x === nx && s.y === ny);
                    return !hitWall && !hitSelf;
                });
                if(safeMoves.length > 0) {
                    let bestMove = safeMoves[0], maxSurvivalScore = -1;
                    safeMoves.forEach(m => {
                        let nx = head.x + m.dx, ny = head.y + m.y; let freeSpaces = 0;
                        [{dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1}].forEach(d => {
                            let sx = nx + d.dx, sy = ny + d.dy; if (!(sx < 0 || sx >= this.cols || sy < 0 || sy >= this.rows || this.snake.some(s => s.x === sx && s.y === sy))) freeSpaces++;
                        });
                        let minTargetDist = Infinity;
                        this.foods.forEach(f => { let dist = Math.abs(nx - f.x) + Math.abs(ny - f.y); if (dist < minTargetDist) minTargetDist = dist; });
                        let survivalScore = (freeSpaces * 1000) - minTargetDist;
                        if (survivalScore > maxSurvivalScore) { maxSurvivalScore = survivalScore; bestMove = m; }
                    });
                    this.engine.input.dx = bestMove.dx; this.engine.input.dy = bestMove.dy;
                }
            },
            loop(time) {
                this.engine.reqId = requestAnimationFrame(this.loop); if(this.cols < 5) return;
                if (time - this.lastTick >= 100) { 
                    if (this.shake === 0) {
                        if (this.engine.isAutoMode) this.aiMove();
                        let head = { x: this.snake[0].x + this.engine.input.dx, y: this.snake[0].y + this.engine.input.dy };
                        if (head.x < 0 || head.x >= this.cols || head.y < 0 || head.y >= this.rows || this.snake.some(s => s.x === head.x && s.y === head.y)) {
                            this.shake = 12; this.spawnParts(this.snake[0].x*this.grid+this.grid/2, this.snake[0].y*this.grid+this.grid/2, '#ffcc00'); setTimeout(()=>this.reset(), 600);
                        } else {
                            this.snake.unshift(head);
                            let ate = this.foods.findIndex(f => f.x === head.x && f.y === head.y);
                            if (ate !== -1) {
                                this.engine.addScore(10); 
                                let f = this.foods.splice(ate, 1)[0]; 
                                this.spawnParts(f.x*this.grid+this.grid/2, f.y*this.grid+this.grid/2, '#ff0055');
                                this.popups.push({x: f.x*this.grid+this.grid/2, y: f.y*this.grid, text: '+10', alpha: 1});
                                this.foods.push(this.spawnFood());
                            } else { this.snake.pop(); }
                        }
                    }
                    this.lastTick = time;
                }
                const ctx = this.engine.gCtx; ctx.fillStyle = '#111'; ctx.fillRect(0, 0, this.engine.rectW, this.engine.rectH);
                ctx.save(); if(this.shake > 0) { ctx.translate((Math.random()-0.5)*12, (Math.random()-0.5)*12); this.shake--; }
                ctx.translate(this.offsetX, this.offsetY);
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.4)'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, this.cols * this.grid, this.rows * this.grid);
                ctx.fillStyle = '#ff0055'; this.foods.forEach(f => ctx.fillRect(f.x * this.grid + 2, f.y * this.grid + 2, this.grid - 4, this.grid - 4));
                this.snake.forEach((s, i) => { ctx.fillStyle = i === 0 ? '#ffffff' : '#39ff14'; ctx.fillRect(s.x*this.grid + 1, s.y*this.grid + 1, this.grid - 2, this.grid - 2); });
                for(let i = this.particles.length-1; i>=0; i--) { let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if(p.life <= 0) { this.particles.splice(i, 1); continue; } ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1; }
                ctx.font = "14px 'Press Start 2P'";
                for(let i = this.popups.length-1; i>=0; i--) {
                    let p = this.popups[i]; p.y -= 0.5; p.alpha -= 0.02;
                    if(p.alpha <= 0) { this.popups.splice(i, 1); continue; }
                    ctx.fillStyle = `rgba(57, 255, 20, ${p.alpha})`; ctx.fillText(p.text, p.x-10, p.y);
                }
                ctx.restore();
            }
        };
    </script>
