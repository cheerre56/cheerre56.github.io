<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIKGAME - 終極美化領域</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           基礎與進場動畫
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #eaddcf; color: #111; font-family: 'VT323', 'Noto Sans TC', monospace; 
            overflow: hidden; width: 100vw; height: 100vh; -webkit-font-smoothing: antialiased; 
            user-select: none; -webkit-user-select: none;
        }

        #intro-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; pointer-events: none;
            transform: scale(1); transform-origin: center center;
            transition: transform 0.5s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.3s ease-in-out;
        }

        #intro-top {
            font-family: 'Press Start 2P', cursive; color: #888; font-size: clamp(0.6rem, 2vw, 1rem); 
            margin-bottom: 20px; opacity: 0; transform: translateY(15px);
            animation: textFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) 0.1s forwards;
            transition: opacity 0.3s ease, transform 0.3s ease; 
        }

        #intro-slogan {
            font-family: 'Press Start 2P', cursive; line-height: 1.2; 
            font-size: clamp(3rem, 12vw, 6rem); letter-spacing: clamp(0.5rem, 2vw, 1rem); padding-left: clamp(0.5rem, 2vw, 1rem); 
            background: linear-gradient(180deg, #ffcc00 0%, #ff6600 50%, #ff0055 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(4px 4px 0px #111);
            opacity: 0; transform: translateY(20px);
            animation: textFadeIn 0.6s cubic-bezier(0.2, 0, 0, 1) 0.2s forwards; 
        }

        #intro-sub {
            font-family: 'Press Start 2P', cursive; color: #888; font-size: clamp(0.5rem, 1.5vw, 0.8rem); 
            margin-top: 20px; opacity: 0; transform: translateY(10px);
            animation: textFadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) 0.3s forwards;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        @keyframes textFadeIn { to { opacity: 1; transform: translateY(0); } }
        .hide-text { opacity: 0 !important; transform: scale(0.8) !important; }
        .zoom-to-i { transform: scale(300) !important; filter: drop-shadow(0 0 0 transparent) !important; }
        .fade-out-wrapper { opacity: 0 !important; }

        #warp-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9998; background: #eaddcf; transition: opacity 0.5s ease;
        }

        /* =========================================
           主介面：高品質新粗野主義 (Premium Neo-Brutalism)
           ========================================= */
        #main-layout {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #eaddcf; background-image: radial-gradient(#ccc6b1 2px, transparent 2px); background-size: 30px 30px;
            z-index: 10; opacity: 0; display: flex; justify-content: center; align-items: flex-start;
            overflow-y: auto; overflow-x: hidden; padding: 20px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #main-layout.arrived { opacity: 1; }

        .bento-grid { 
            width: 100%; max-width: 1200px; margin: auto; 
            display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px 0; 
        }
        
        .retro-card { 
            background: #fff; border: 4px solid #111; border-radius: 16px; 
            padding: 30px; box-shadow: 8px 8px 0px #111; position: relative; 
        }

        .panel-left { display: flex; flex-direction: column; align-items: center; background: #ffe3e8; }
        .avatar-container {
            width: 130px; height: 130px; border-radius: 50%; background: #ffcc00; border: 4px solid #111; box-shadow: 6px 6px 0px #111;
            margin-bottom: 25px; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .avatar { font-family: 'Press Start 2P', cursive; font-size: 3rem; color: #111; margin-top: 10px; }
        .nik-name { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; color: #111; margin-bottom: 35px; text-align: center; line-height: 1.5; }

        /* 【優化】社群按鈕：圖上字下、完美置中 */
        .social-btns { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; margin-top: auto; }
        .btn {
            width: 100%; padding: 15px 0; text-align: center; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; 
            text-decoration: none; border-radius: 8px; color: #111; border: 4px solid #111; box-shadow: 6px 6px 0px #111;
            transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .btn svg { width: 26px; height: 26px; }
        .btn:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #111; }
        .btn:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #111; }
        .btn-steam { background: #66c0f4; } .btn-discord { background: #7289da; color: #fff; } .btn-ig { background: #ff0055; color: #fff; }

        /* 【優化】藍色資訊框：乾淨俐落的閃爍游標 */
        .panel-top { 
            background: #e3f2fd; 
            display: flex; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        .welcome-text { 
            font-family: 'Press Start 2P', cursive; 
            font-size: clamp(1.2rem, 4vw, 2.5rem); 
            color: #111; margin: 0; line-height: 1.5; 
        }
        .blink-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .panel-bottom { padding: 25px; display: flex; flex-direction: column; background: #fff; overflow: hidden; width: 100%; height: 100%; }
        
        .game-top-bar {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; gap: 15px; flex-wrap: wrap; width: 100%;
        }

        .game-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .game-tab {
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; background: #f0f0f0; color: #555; 
            border: 3px solid #111; padding: 10px 12px; border-radius: 6px; cursor: pointer; 
            box-shadow: 3px 3px 0px #111; transition: all 0.1s; text-align: center;
        }
        .game-tab:hover { background: #e0e0e0; transform: translate(1px, 1px); box-shadow: 2px 2px 0px #111; }
        .game-tab.active { background: #ff0055; color: #fff; box-shadow: 0px 0px 0px #111; transform: translate(3px, 3px); }

        .game-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .mode-btn {
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; background: #ffcc00; color: #111; 
            border: 3px solid #111; padding: 10px 12px; border-radius: 6px; cursor: pointer; 
            transition: all 0.1s; box-shadow: 3px 3px 0px #111;
        }
        .mode-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #111; }
        .mode-btn.manual { background: #39ff14; }

        .score-display { 
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #111; 
            display: flex; align-items: center; gap: 8px; background: #fff; 
            border: 3px solid #111; padding: 10px 12px; border-radius: 6px; box-shadow: 3px 3px 0px #111;
        }
        .score-val { color: #ff0055; font-size: 0.7rem; transition: text-shadow 0.1s, color 0.1s; font-weight: bold;}
        .score-val.flash { color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }

        .canvas-container { 
            flex: 1; width: 100%; background: #111; position: relative; touch-action: none; 
            min-height: 350px; display: flex; justify-content: center; align-items: center;
            border: 4px solid #111; border-radius: 8px; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }

        .game-instructions { 
            margin-top: 15px; padding: 12px; font-family: 'VT323', monospace; font-size: 1.2rem; 
            color: #555; text-align: center; border-radius: 8px; background: #f0f0f0; border: 2px dashed #ccc;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00f0ff; font-family: 'Press Start 2P', cursive;
        }
        .progress-bar { width: 60%; height: 20px; border: 3px solid #fff; background: #111; padding: 2px; margin-top: 15px;}
        .progress-fill { width: 0%; height: 100%; background: #ff0055; }

        @media (min-width: 900px) {
            #main-layout { padding: 40px; align-items: center; }
            .bento-grid { grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; gap: 30px; height: 85vh; padding: 0; }
            .retro-card { padding: 35px; box-shadow: 10px 10px 0px #111; }
            .panel-left { grid-column: 1 / 2; grid-row: 1 / 3; padding: 40px; justify-content: flex-start;}
            .avatar-container { width: 140px; height: 140px; border-width: 4px; box-shadow: 6px 6px 0px #111; margin-bottom: 25px;}
            .avatar { font-size: 3rem; }
            .social-btns { flex-direction: column; width: 100%; gap: 20px; margin-top: auto;}
            
            .panel-top { grid-column: 2 / 3; grid-row: 1 / 2; }
            .panel-bottom { grid-column: 2 / 3; grid-row: 2 / 3; padding: 30px; }
            
            .game-top-bar { flex-wrap: nowrap; margin-bottom: 20px; }
            .game-tab { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .game-tab:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #111; }
            .game-tab.active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #111; }
            .mode-btn { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .mode-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #111; }
            .score-display { font-size: 0.7rem; padding: 12px 15px; box-shadow: 4px 4px 0px #111; }
            .score-val { font-size: 0.9rem; }
            .game-instructions { font-size: 1.4rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div id="intro-top">INSERT COIN</div>
        <div id="intro-slogan">NIK</div>
        <div id="intro-sub">PLAYER 1 START</div>
    </div>
    <canvas id="warp-canvas"></canvas>

    <div id="main-layout">
        <div class="bento-grid">
            
            <div class="retro-card panel-left">
                <div class="avatar-container"><div class="avatar">N</div></div>
                <div class="nik-name">NIK<br>GAME</div>
                
                <!-- SVG 社群按鈕：圖上字下 -->
                <div class="social-btns">
                    <a href="https://steamcommunity.com/id/TWDL/" target="_blank" class="btn btn-steam">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M11.97 0C5.36 0 0 5.37 0 12c0 6.63 5.36 12 11.97 12 6.61 0 11.97-5.37 11.97-12C23.94 5.37 18.58 0 11.97 0zm6.81 8.87c.07.25.12.52.12.8 0 1.51-1.23 2.73-2.73 2.73-.1 0-.2-.01-.3-.03l-2.82 4.09c.08.26.13.53.13.82 0 1.51-1.23 2.73-2.73 2.73-1.5 0-2.73-1.22-2.73-2.73 0-1.36.98-2.48 2.27-2.68l2.99-3.8c-.04-.15-.06-.31-.06-.47 0-1.51 1.23-2.73 2.73-2.73 1.5 0 2.73 1.22 2.73 2.73zm-4.08 1.15c-.65 0-1.18-.53-1.18-1.18 0-.65.53-1.18 1.18-1.18.65 0 1.18.53 1.18 1.18 0 .65-.53 1.18-1.18 1.18zm-4.32 7.63c-.65 0-1.18-.53-1.18-1.18 0-.65.53-1.18 1.18-1.18.65 0 1.18.53 1.18 1.18 0 .65-.53 1.18-1.18 1.18z"/>
                        </svg>
                        <span>STEAM</span>
                    </a>
                    <a href="https://discord.gg/YMGpsatqzt" target="_blank" class="btn btn-discord">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.445.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.618-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.028C.533 9.046-.32 13.58.099 18.058a.082.082 0 00.031.056 19.908 19.908 0 005.993 3.029.078.078 0 00.084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.099.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.106c.36.698.772 1.363 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.029zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.419 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.419 0 1.333-.946 2.419-2.157 2.419z"/>
                        </svg>
                        <span>DISCORD</span>
                    </a>
                    <a href="https://www.instagram.com/lin_lcx/" target="_blank" class="btn btn-ig">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                        <span>INSTAGRAM</span>
                    </a>
                </div>
            </div>

            <!-- 【優化】極簡打字閃爍標題 -->
            <div class="retro-card panel-top">
                <h1 class="welcome-text">Welcome !<span class="blink-cursor">_</span></h1>
            </div>

            <div class="retro-card panel-bottom">
                <div class="game-top-bar">
                    <div class="game-tabs" id="gameTabs">
                        <button class="game-tab active" data-game="pacman">PAC-MAN</button>
                        <button class="game-tab" data-game="shooter">SHOOTER</button>
                        <button class="game-tab" data-game="snake">SNAKE</button>
                    </div>
                    
                    <div class="game-controls">
                        <button id="modeBtn" class="mode-btn" style="display:none;">AI MODE</button>
                        <div class="score-display">SCORE: <span class="score-val" id="score">0</span></div>
                    </div>
                </div>

                <div class="canvas-container" id="canvasContainer">
                    <div id="loading-overlay">
                        <div class="loading-text">LOADING <span id="load-progress">0</span>%</div>
                        <div class="progress-bar"><div class="progress-fill" id="load-fill"></div></div>
                    </div>
                    <canvas id="gameCanvas"></canvas>
                </div>
                
                <div class="game-instructions" id="gameInstructions">LOADING SYSTEM...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 進場動畫 
        // ==========================================
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        const introWrapper = document.getElementById('intro-wrapper');
        const mainLayout = document.getElementById('main-layout');

        let width, height, centerX, centerY, warpParticles = [], speed = 0.5, maxSpeed = 35, isAccelerating = false, aniId;

        function resizeWarp() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr;
            canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr); centerX = width / 2; centerY = height / 2;
        }
        window.addEventListener('resize', resizeWarp); resizeWarp();

        class WarpParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2;
                this.z = Math.random() * width; this.pz = this.z; this.alpha = Math.random() * 0.8 + 0.2; this.thickness = Math.random() * 2 + 1; 
            }
            update() { this.z -= speed; if (this.z < 1) { this.z = width; this.x = (Math.random() - 0.5) * width * 2; this.y = (Math.random() - 0.5) * height * 2; this.pz = this.z; } }
            draw() {
                const fov = 300, sx = (this.x / this.z) * fov + centerX, sy = (this.y / this.z) * fov + centerY;
                const px = (this.x / this.pz) * fov + centerX, py = (this.y / this.pz) * fov + centerY; this.pz = this.z;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.lineWidth = Math.max(0.5, (1 - this.z / width) * this.thickness); 
                ctx.strokeStyle = `rgba(17, 17, 17, ${(1 - this.z / width) * this.alpha})`; ctx.stroke(); 
            }
        }
        for (let i = 0; i < 400; i++) warpParticles.push(new WarpParticle());

        function animateWarp() {
            ctx.fillStyle = 'rgba(234, 221, 207, 0.3)'; ctx.fillRect(0, 0, width, height);
            if (isAccelerating) { speed += 1.5; if (speed > maxSpeed) speed = maxSpeed; }
            warpParticles.forEach(p => { p.update(); p.draw(); });
            aniId = requestAnimationFrame(animateWarp);
        }
        animateWarp();

        setTimeout(() => { isAccelerating = true; }, 400); 
        setTimeout(() => {
            document.getElementById('intro-top').classList.add('hide-text'); document.getElementById('intro-sub').classList.add('hide-text');
            introWrapper.classList.add('zoom-to-i');
        }, 800); 
        setTimeout(() => {
            introWrapper.classList.add('fade-out-wrapper'); canvas.style.opacity = '0'; mainLayout.classList.add('arrived');
            setTimeout(() => { cancelAnimationFrame(aniId); canvas.style.display = 'none'; introWrapper.style.display = 'none'; simulateLoading(); }, 300); 
        }, 1300); 

        function simulateLoading() {
            let progress = 0;
            const progressEl = document.getElementById('load-progress'), fillEl = document.getElementById('load-fill'), overlay = document.getElementById('loading-overlay'), modeBtn = document.getElementById('modeBtn');
            const loadInt = setInterval(() => {
                progress += Math.floor(Math.random() * 25) + 15;
                if (progress >= 100) {
                    progress = 100; clearInterval(loadInt); progressEl.innerText = progress; fillEl.style.width = progress + '%';
                    setTimeout(() => { 
                        overlay.style.display = 'none'; modeBtn.style.display = 'block'; 
                        GameEngine.init(); 
                    }, 400); 
                } else { progressEl.innerText = progress; fillEl.style.width = progress + '%'; }
            }, 80);
        }

        // ==========================================
        // 2. 主控引擎
        // ==========================================
        const GameEngine = {
            activeGame: 'pacman', isAutoMode: true, score: 0, gCanvas: null, gCtx: null, rectW: 0, rectH: 0, reqId: null,
            input: { dx: 1, dy: 0, left: false, right: false, mouseX: null },

            init() {
                this.gCanvas = document.getElementById('gameCanvas'); this.gCtx = this.gCanvas.getContext('2d');
                this.bindEvents(); this.setupResizeObserver(); this.startGame();
            },

            updateInstructions() {
                const instEl = document.getElementById('gameInstructions');
                if (this.isAutoMode) { instEl.style.color = '#111'; instEl.innerText = ">> AI 掛機中。點擊 MANUAL 按鈕即可親自遊玩。"; } 
                else {
                    instEl.style.color = '#ff0055';
                    if (this.activeGame === 'pacman' || this.activeGame === 'snake') instEl.innerText = "[操作] 鍵盤方向鍵，或「點擊/滑動」畫面控制方向。";
                    else if (this.activeGame === 'shooter') instEl.innerText = "[操作] 鍵盤左右鍵，或「按住滑動」畫面移動戰機。";
                }
            },

            setupResizeObserver() {
                const container = document.getElementById('canvasContainer');
                new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const rect = entry.contentRect;
                        if (rect.width > 0 && rect.height > 0) {
                            this.rectW = rect.width; this.rectH = rect.height;
                            const dpr = window.devicePixelRatio || 1;
                            this.gCanvas.width = rect.width * dpr; this.gCanvas.height = rect.height * dpr; 
                            this.gCtx.scale(dpr, dpr); this.stopCurrent(); this.startGame();
                        }
                    }
                }).observe(container);
            },

            bindEvents() {
                const modeBtn = document.getElementById('modeBtn'), container = document.getElementById('canvasContainer');
                const tabs = document.querySelectorAll('.game-tab');

                modeBtn.addEventListener('click', () => {
                    this.isAutoMode = !this.isAutoMode; modeBtn.innerText = this.isAutoMode ? "AI MODE" : "MANUAL";
                    this.isAutoMode ? modeBtn.classList.remove('manual') : modeBtn.classList.add('manual'); this.updateInstructions();
                });

                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        if(tab.classList.contains('active')) return;
                        tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active');
                        this.activeGame = tab.getAttribute('data-game'); this.stopCurrent(); this.startGame();
                    });
                });

                window.addEventListener('keydown', e => {
                    if (this.isAutoMode) return;
                    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
                    if (this.activeGame === 'pacman' || this.activeGame === 'snake') {
                        if (e.key === 'ArrowUp' && this.input.dy !== 1) { this.input.dx = 0; this.input.dy = -1; }
                        if (e.key === 'ArrowDown' && this.input.dy !== -1) { this.input.dx = 0; this.input.dy = 1; }

                ctx.fillStyle = '#ff0055'; this.foods.forEach(f => ctx.fillRect(f.x * this.grid + 2, f.y * this.grid + 2, this.grid - 4, this.grid - 4));
                this.snake.forEach((s, i) => { ctx.fillStyle = i === 0 ? '#ffffff' : '#39ff14'; ctx.fillRect(s.x*this.grid + 1, s.y*this.grid + 1, this.grid - 2, this.grid - 2); });
                for(let i = this.particles.length-1; i>=0; i--) { let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; if(p.life <= 0) { this.particles.splice(i, 1); continue; } ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1; }
                ctx.font = "14px 'Press Start 2P'";
                for(let i = this.popups.length-1; i>=0; i--) {
                    let p = this.popups[i]; p.y -= 0.5; p.alpha -= 0.02;
                    if(p.alpha <= 0) { this.popups.splice(i, 1); continue; }
                    ctx.fillStyle = `rgba(57, 255, 20, ${p.alpha})`; ctx.fillText(p.text, p.x-10, p.y);
                }
                ctx.restore();
            }
        };
    </script>
