<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="安全密碼生成器，流暢滑桿與手機觸控優化，支援無障礙功能">
    <title>安全密碼生成器</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            
            /* Strength Colors */
            --c-weak: #ef4444;
            --c-fair: #f59e0b;
            --c-good: #3b82f6;
            --c-strong: #10b981;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #111827;
                --bg-card: #1f2937;
                --bg-input: #111827;
                --text-main: #f9fafb;
                --text-muted: #9ca3af;
                --border: #374151;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .card {
            background: var(--bg-card);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Password Display Area */
        .password-box {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .password-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        #passwordDisplay {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--primary);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 0.75rem;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.75rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-main);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Strength Meter (Segmented) */
        .strength-section {
            margin-bottom: 2rem;
        }

        .strength-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .strength-bars {
            display: flex;
            gap: 6px;
            height: 6px;
        }

        .strength-bar {
            flex: 1;
            background-color: var(--border);
            border-radius: 99px;
            transition: background-color 0.3s ease;
        }

        /* Slider Controls */
        .control-section {
            margin-bottom: 2rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        #sliderValue {
            color: var(--primary);
            font-weight: 700;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: -7px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover,
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Generate Button */
        .primary-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }

        .primary-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .primary-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Toast Message */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-main);
            color: var(--bg-card);
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>
    <div class="card" role="main">
        <div class="header">
            <h1>密碼生成器</h1>
            <p>保護您的數位資產</p>
        </div>

        <div class="password-box">
            <label for="passwordDisplay" class="sr-only">生成的密碼</label>
            <input type="text" id="passwordDisplay" readonly aria-describedby="strengthText">
            <button id="copyBtn" class="icon-btn" aria-label="複製密碼" title="複製密碼">
                <svg id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg id="icon-check" viewBox="0 0 24 24" fill="none" stroke="var(--c-strong)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </button>
        </div>

        <div class="strength-section" role="region" aria-live="polite">
            <div class="strength-header">
                <span>密碼強度</span>
                <span id="strengthText">中等</span>
            </div>
            <div class="strength-bars">
                <div class="strength-bar" id="bar-1"></div>
                <div class="strength-bar" id="bar-2"></div>
                <div class="strength-bar" id="bar-3"></div>
                <div class="strength-bar" id="bar-4"></div>
            </div>
        </div>

        <div class="control-section">
            <div class="slider-header">
                <label for="strengthSlider">複雜度與長度</label>
                <span id="sliderValue">Level 8</span>
            </div>
            <input type="range" id="strengthSlider" min="1" max="15" value="8" step="1" aria-valuemin="1" aria-valuemax="15" aria-valuenow="8">
            <div style="text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;" id="rulesText">
                10位 (字母+數字+大寫)
            </div>
        </div>

        <button id="generateBtn" class="primary-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                <path d="M21 3v5h-5"></path>
            </svg>
            生成新密碼
        </button>
    </div>

    <div id="toast" class="toast">密碼已複製！</div>

    <script>
        const PasswordGenerator = {
            chars: {
                lowercase: 'abcdefghijklmnopqrstuvwxyz',
                uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                numbers: '0123456789',
                symbols: '!@#$%^&*()'
            },
            configs: [
                { level: 1, length: 6, desc: '字母+數字', expected: '非常弱' },
                { level: 2, length: 6, desc: '字母+數字+大寫', expected: '非常弱' },
                { level: 3, length: 6, desc: '包含符號', expected: '弱' },
                { level: 4, length: 8, desc: '字母+數字', expected: '弱' },
                { level: 5, length: 8, desc: '字母+數字+大寫', expected: '弱' },
                { level: 6, length: 8, desc: '包含符號', expected: '中等' },
                { level: 7, length: 10, desc: '字母+數字', expected: '弱' },
                { level: 8, length: 10, desc: '字母+數字+大寫', expected: '中等' },
                { level: 9, length: 10, desc: '包含符號', expected: '中等' },
                { level: 10, length: 14, desc: '字母+數字', expected: '中等' },
                { level: 11, length: 14, desc: '字母+數字+大寫', expected: '強' },
                { level: 12, length: 14, desc: '包含符號', expected: '強' },
                { level: 13, length: 16, desc: '字母+數字', expected: '強' },
                { level: 14, length: 16, desc: '字母+數字+大寫', expected: '強' },
                { level: 15, length: 16, desc: '包含符號', expected: '非常強' }
            ],

            // 修正點 2：加入更安全的隨機數產生器，避免舊環境不支援 window.crypto 導致報錯死機
            getSafeRandom(max) {
                try {
                    const cryptoObj = window.crypto || window.msCrypto;
                    if (cryptoObj && cryptoObj.getRandomValues) {
                        const array = new Uint32Array(1);
                        cryptoObj.getRandomValues(array);
                        return array[0] % max;
                    }
                } catch (e) {
                    console.warn("Crypto API fallback");
                }
                return Math.floor(Math.random() * max);
            },

            generate(level) {
                // 確保 level 是數字
                const safeLevel = parseInt(level, 10) || 8;
                const config = this.configs.find(function(c) { return c.level === safeLevel; });
                
                let charSets = ['lowercase', 'numbers'];
                if (config.desc.indexOf('大寫') !== -1 || config.desc.indexOf('符號') !== -1) charSets.push('uppercase');
                if (config.desc.indexOf('符號') !== -1) charSets.push('symbols');

                let chars = '';
                for (let i = 0; i < charSets.length; i++) {
                    chars += this.chars[charSets[i]];
                }

                let password = [];
                
                // 確保每種要求的字元至少出現一次
                for (let i = 0; i < charSets.length; i++) {
                    let setChars = this.chars[charSets[i]];
                    password.push(setChars[this.getSafeRandom(setChars.length)]);
                }

                // 填補剩餘長度
                while (password.length < config.length) {
                    password.push(chars[this.getSafeRandom(chars.length)]);
                }

                // 修正點 3：改用傳統變數交換順序 (Fisher-Yates)，取代陣列解構，提升極限相容性
                for (let i = password.length - 1; i > 0; i--) {
                    const j = this.getSafeRandom(i + 1);
                    const temp = password[i];
                    password[i] = password[j];
                    password[j] = temp;
                }

                return password.join('');
            },

            evaluateStrength(password) {
                let charScore = 0;
                if (/[A-Z]/.test(password)) charScore += 1;
                if (/[a-z]/.test(password)) charScore += 1;
                if (/[0-9]/.test(password)) charScore += 1;
                if (/[!@#$%^&*()]/.test(password)) charScore += 1;

                let lengthScore = 0;
                if (password.length >= 8) lengthScore += 1;
                if (password.length >= 10) lengthScore += 2;
                if (password.length >= 14) lengthScore += 3;

                let totalScore = charScore + lengthScore;
                
                if (totalScore <= 3) return { score: 1, text: '太弱了', color: 'var(--c-weak)' };
                if (totalScore <= 5) return { score: 2, text: '還可以', color: 'var(--c-fair)' };
                if (totalScore <= 6) return { score: 3, text: '安全', color: 'var(--c-good)' };
                return { score: 4, text: '非常安全', color: 'var(--c-strong)' };
            }
        };

        const UI = {
            elements: {
                passwordDisplay: document.getElementById('passwordDisplay'),
                strengthText: document.getElementById('strengthText'),
                bars: [
                    document.getElementById('bar-1'),
                    document.getElementById('bar-2'),
                    document.getElementById('bar-3'),
                    document.getElementById('bar-4')
                ],
                strengthSlider: document.getElementById('strengthSlider'),
                sliderValue: document.getElementById('sliderValue'),
                rulesText: document.getElementById('rulesText'),
                generateBtn: document.getElementById('generateBtn'),
                copyBtn: document.getElementById('copyBtn'),
                iconCopy: document.getElementById('icon-copy'),
                iconCheck: document.getElementById('icon-check'),
                toast: document.getElementById('toast')
            },

            updatePassword(password) {
                this.elements.passwordDisplay.value = password;
                this.updateStrength(PasswordGenerator.evaluateStrength(password));
                this.resetCopyIcon();
            },

            updateStrength(data) {
                this.elements.strengthText.textContent = data.text;
                this.elements.strengthText.style.color = data.color;
                
                for (let i = 0; i < this.elements.bars.length; i++) {
                    if (i < data.score) {
                        this.elements.bars[i].style.backgroundColor = data.color;
                    } else {
                        this.elements.bars[i].style.backgroundColor = 'var(--border)';
                    }
                }
            },

            updateSliderUI(level) {
                const safeLevel = parseInt(level, 10) || 8;
                const config = PasswordGenerator.configs.find(function(c) { return c.level === safeLevel; });
                if (!config) return;
                
                this.elements.sliderValue.textContent = 'Level ' + safeLevel;
                this.elements.rulesText.textContent = config.length + '位字元 (' + config.desc + ')';
                this.elements.strengthSlider.setAttribute('aria-valuenow', safeLevel);
            },

            showToast(message) {
                this.elements.toast.textContent = message;
                this.elements.toast.classList.add('show');
                
                this.elements.iconCopy.style.display = 'none';
                this.elements.iconCheck.style.display = 'block';

                const _this = this;
                setTimeout(function() {
                    _this.elements.toast.classList.remove('show');
                    setTimeout(function() { _this.resetCopyIcon(); }, 300);
                }, 2000);
            },

            resetCopyIcon() {
                this.elements.iconCopy.style.display = 'block';
                this.elements.iconCheck.style.display = 'none';
            }
        };

        function init() {
            const initialLevel = UI.elements.strengthSlider.value;
            UI.updateSliderUI(initialLevel);
            UI.updatePassword(PasswordGenerator.generate(initialLevel));

            UI.elements.generateBtn.addEventListener('click', function() {
                const svg = UI.elements.generateBtn.querySelector('svg');
                if (svg) {
                    svg.style.transform = 'rotate(180deg)';
                    svg.style.transition = 'transform 0.3s ease';
                    setTimeout(function() { 
                        svg.style.transform = 'none'; 
                        svg.style.transition = 'none'; 
                    }, 300);
                }

                const level = UI.elements.strengthSlider.value;
                UI.updatePassword(PasswordGenerator.generate(level));
            });

            UI.elements.copyBtn.addEventListener('click', function() {
                UI.elements.passwordDisplay.select();
                UI.elements.passwordDisplay.setSelectionRange(0, 99999);
                try {
                    navigator.clipboard.writeText(UI.elements.passwordDisplay.value);
                    UI.showToast('密碼已成功複製！');
                } catch (err) {
                    UI.showToast('複製失敗，請手動複製');
                }
            });

            UI.elements.strengthSlider.addEventListener('input', function(e) {
                const level = e.target.value;
                UI.updateSliderUI(level);
                UI.updatePassword(PasswordGenerator.generate(level));
            });
        }

        // 確保 DOM 元素載入完畢後再執行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
