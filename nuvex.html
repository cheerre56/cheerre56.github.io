<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Nuvex Zen Start</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0f1115;
      --bg-elevated: #151922;
      --bg-soft: rgba(255, 255, 255, 0.04);
      --bg-soft-2: rgba(255, 255, 255, 0.06);
      --bg-soft-3: rgba(255, 255, 255, 0.08);

      --card: rgba(255, 255, 255, 0.045);
      --card-hover: rgba(255, 255, 255, 0.07);
      --card-strong: rgba(255, 255, 255, 0.09);

      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.12);
      --border-focus: rgba(199, 211, 255, 0.26);

      --text: #f3f5f8;
      --text-sub: rgba(243, 245, 248, 0.68);
      --text-soft: rgba(243, 245, 248, 0.42);

      --accent: #c7d3ff;
      --accent-soft: rgba(199, 211, 255, 0.08);
      --accent-soft-2: rgba(199, 211, 255, 0.12);

      --danger: #ff8585;
      --folder: #d8c28b;

      --shadow-1: 0 8px 24px rgba(0, 0, 0, 0.18);
      --shadow-2: 0 20px 50px rgba(0, 0, 0, 0.24);

      --blur: blur(18px);

      --radius-1: 28px;
      --radius-2: 22px;
      --radius-3: 18px;
      --radius-4: 14px;
      --radius-pill: 999px;

      --page-width: 1120px;
      --search-width: 900px;
      --grid-width: 1000px;
    }

    body.light-mode {
      --bg: #f4f6f8;
      --bg-elevated: #ffffff;
      --bg-soft: rgba(17, 24, 39, 0.035);
      --bg-soft-2: rgba(17, 24, 39, 0.05);
      --bg-soft-3: rgba(17, 24, 39, 0.07);

      --card: rgba(255, 255, 255, 0.72);
      --card-hover: rgba(255, 255, 255, 0.9);
      --card-strong: rgba(255, 255, 255, 0.96);

      --border: rgba(17, 24, 39, 0.08);
      --border-strong: rgba(17, 24, 39, 0.12);
      --border-focus: rgba(98, 118, 180, 0.22);

      --text: #111827;
      --text-sub: rgba(17, 24, 39, 0.68);
      --text-soft: rgba(17, 24, 39, 0.42);

      --accent: #6f83b5;
      --accent-soft: rgba(111, 131, 181, 0.08);
      --accent-soft-2: rgba(111, 131, 181, 0.12);

      --danger: #e25555;
      --folder: #b79a59;

      --shadow-1: 0 10px 28px rgba(64, 78, 106, 0.08);
      --shadow-2: 0 24px 56px rgba(64, 78, 106, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.03), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.025), transparent 22%),
        linear-gradient(180deg, #101318 0%, var(--bg) 100%);
      overflow-x: hidden;
      position: relative;
      letter-spacing: -0.01em;
    }

    body.light-mode {
      background:
        radial-gradient(circle at top left, rgba(111, 131, 181, 0.06), transparent 26%),
        radial-gradient(circle at bottom right, rgba(111, 131, 181, 0.04), transparent 24%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.018), rgba(255,255,255,0.018)),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 3px,
          rgba(255,255,255,0.012) 4px
        );
      opacity: 0.18;
      z-index: -1;
    }

    body.light-mode::before {
      opacity: 0.08;
    }

    button, input {
      font: inherit;
    }

    .shell {
      width: 100%;
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 20px 22px 56px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .ghost-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-1);
      transition: 0.2s ease;
    }

    .ghost-btn:hover {
      color: var(--text);
      background: var(--card-hover);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      margin-bottom: 28px;
    }

    .clock-wrap {
      text-align: center;
    }

    .clock {
      font-size: clamp(4rem, 10vw, 6.4rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.055em;
      color: var(--text);
      margin: 0;
    }

    .date-line {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .soft-pill {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-sub);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-1);
      font-size: 0.92rem;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .soft-pill.clickable {
      cursor: pointer;
    }

    .soft-pill.clickable:hover {
      background: var(--card-hover);
      color: var(--text);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .search-zone {
      width: 100%;
      max-width: var(--search-width);
      margin: 0 auto 18px;
      position: relative;
    }

    .search-form {
      position: relative;
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 74px;
      padding: 10px 12px 10px 16px;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-2);
      transition: 0.22s ease;
    }

    .search-shell:hover,
    .search-shell:focus-within {
      background: var(--card-hover);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .search-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      border-radius: 50%;
    }

    .search-main {
      flex: 1 1 auto;
      min-width: 0;
      position: relative;
    }

    .search-input {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 1.04rem;
      font-weight: 500;
      padding: 6px 2px;
    }

    .search-input::placeholder {
      color: var(--text-soft);
      font-weight: 500;
    }

    .search-input:focus {
      outline: none;
    }

    .listen-text {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      color: #ff9b9b;
      font-size: 0.84rem;
      display: none;
    }

    .search-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .mini-btn {
      height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .mini-btn.circle {
      width: 42px;
      padding: 0;
      border-radius: 50%;
    }

    .mini-btn:hover,
    .mini-btn.active {
      background: var(--bg-soft-3);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: 250px;
      padding: 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-strong);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-2);
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 100;
    }

    .dropdown.show {
      display: flex;
      animation: dropdownIn 0.16s ease;
    }

    @keyframes dropdownIn {
      from {
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .dropdown-item {
      min-height: 50px;
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .dropdown-item:hover {
      background: var(--bg-soft-2);
    }

    .dropdown-item svg {
      width: 18px;
      height: 18px;
      color: var(--text-sub);
      flex: 0 0 auto;
    }

    .dropdown-item .meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .dropdown-item .meta b {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--text);
    }

    .dropdown-item .meta span {
      font-size: 0.78rem;
      color: var(--text-sub);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 0 auto 28px;
      max-width: var(--search-width);
    }

    .toolbar-chip {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: 0.2s ease;
      backdrop-filter: var(--blur);
    }

    .toolbar-chip:hover {
      background: var(--card-hover);
      color: var(--text);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .board {
      width: 100%;
      max-width: var(--grid-width);
      margin: 0 auto;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-2);
      padding: 18px 18px 20px;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .board-title {
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.01em;
    }

    .board-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta-badge {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text-sub);
      display: inline-flex;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .breadcrumb {
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 2px 16px;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .breadcrumb-item {
      cursor: pointer;
      transition: 0.18s ease;
    }

    .breadcrumb-item:hover {
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 20px 12px;
    }

    .card {
      position: relative;
      min-height: 122px;
      padding: 10px 8px;
      border-radius: 22px;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
      transition: 0.18s ease;
      user-select: none;
    }

    .card:hover {
      background: var(--bg-soft);
      border-color: var(--border);
      transform: translateY(-2px);
    }

    .card:active {
      transform: scale(0.985);
    }

    .icon-box {
      width: 70px;
      height: 70px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-soft-2), var(--bg-soft));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      margin-bottom: 11px;
      overflow: hidden;
      transition: 0.2s ease;
    }

    .card:hover .icon-box {
      background: linear-gradient(180deg, var(--bg-soft-3), var(--bg-soft-2));
      border-color: var(--border-strong);
    }

    .favicon {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 8px;
    }

    .folder-svg {
      width: 32px;
      height: 32px;
      color: var(--folder);
    }

    .card-title {
      width: 100%;
      text-align: center;
      color: var(--text);
      font-size: 0.87rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px;
    }

    .card-sub {
      width: 100%;
      margin-top: 4px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px;
    }

    .add-card .add-box {
      width: 70px;
      height: 70px;
      border-radius: 22px;
      border: 1.5px dashed var(--border-strong);
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 11px;
      transition: 0.2s ease;
      background: transparent;
    }

    .add-card:hover .add-box {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .card.drag-merge .icon-box {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .card.drag-sort-left {
      border-left: 2px solid var(--accent);
    }

    .card.drag-sort-right {
      border-right: 2px solid var(--accent);
    }

    .hint {
      margin-top: 16px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .context-menu {
      position: fixed;
      min-width: 184px;
      padding: 6px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--card-strong);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow-2);
      display: none;
      z-index: 999;
    }

    .menu-item {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.18s ease;
    }

    .menu-item:hover {
      background: var(--bg-soft-2);
    }

    .menu-item.danger {
      color: var(--danger);
    }

    .menu-item.danger:hover {
      background: rgba(255, 133, 133, 0.08);
    }

    .menu-divider {
      height: 1px;
      margin: 4px 0;
      background: var(--border);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s ease;
      z-index: 2000;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: min(420px, 100%);
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--card-strong);
      backdrop-filter: blur(28px);
      box-shadow: var(--shadow-2);
      padding: 24px;
      transform: translateY(8px) scale(0.985);
      transition: 0.2s ease;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 700;
    }

    .modal-desc {
      margin: 0 0 18px;
      color: var(--text-sub);
      font-size: 0.9rem;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-sub);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .input {
      width: 100%;
      min-height: 50px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      padding: 14px 15px;
      transition: 0.18s ease;
    }

    .input::placeholder {
      color: var(--text-soft);
    }

    .input:focus {
      outline: none;
      background: var(--bg-soft-2);
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.18s ease;
      font-weight: 600;
    }

    .btn.subtle {
      background: var(--bg-soft);
      color: var(--text-sub);
    }

    .btn.subtle:hover {
      background: var(--bg-soft-2);
      color: var(--text);
    }

    .btn.primary {
      background: var(--text);
      color: var(--bg);
      border-color: transparent;
    }

    .btn.primary:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    body.light-mode .btn.primary {
      background: #111827;
      color: #ffffff;
    }

    .modal-note {
      margin-top: 10px;
      text-align: right;
      color: var(--text-soft);
      font-size: 0.8rem;
    }

    @media (max-width: 860px) {
      .shell {
        padding: 16px 14px 42px;
      }

      .topbar {
        margin-bottom: 30px;
      }

      .search-shell {
        min-height: auto;
        flex-wrap: wrap;
        padding: 12px;
        border-radius: 26px;
      }

      .search-main {
        order: 2;
        width: 100%;
        flex: 0 0 100%;
      }

      .search-actions {
        order: 3;
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .mini-btn:not(.circle) {
        flex: 1 1 calc(50% - 6px);
        justify-content: center;
      }

      .dropdown {
        width: 100%;
        left: 0;
        right: 0;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(98px, 1fr));
        gap: 18px 10px;
      }

      .board {
        padding: 16px 12px 18px;
        border-radius: 24px;
      }
    }

    @media (max-width: 560px) {
      .clock {
        font-size: clamp(3.4rem, 18vw, 4.8rem);
      }

      .soft-pill {
        min-height: 36px;
        font-size: 0.86rem;
        padding: 0 12px;
      }

      .toolbar {
        gap: 8px;
      }

      .toolbar-chip {
        min-height: 36px;
        font-size: 0.84rem;
      }

      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px 8px;
      }

      .card {
        min-height: 106px;
        padding: 8px 4px;
      }

      .icon-box,
      .add-card .add-box {
        width: 62px;
        height: 62px;
        border-radius: 19px;
      }

      .favicon {
        width: 32px;
        height: 32px;
      }

      .card-title {
        font-size: 0.81rem;
      }

      .card-sub {
        font-size: 0.68rem;
      }

      .modal {
        border-radius: 22px;
        padding: 20px;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <button class="ghost-btn" id="themeBtn" title="切換主題" aria-label="切換主題">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3c0 .28-.01.56-.01.84A8.16 8.16 0 0 0 20 12c0 .27 0 .53.01.79Z"></path>
        </svg>
      </button>
    </div>

    <section class="hero">
      <div class="clock-wrap">
        <div class="clock" id="clock">00:00</div>

        <div class="date-line">

  <div class="context-menu" id="contextMenu">

      <div class="menu-item" onclick="openModal('link')">新增捷徑</div>

  <div class="modal-overlay" id="linkModal">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 class="modal-title" id="modalTitle">新增捷徑</h3>
      <p class="modal-desc" id="modalDesc">新增常用網站或建立資料夾分類。</p>

      <div class="field">
        <label for="itemName">名稱</label>
        <input id="itemName" class="input" type="text" placeholder="例如：ChatGPT" />
      </div>

      <div class="field" id="urlGroup">
        <label for="itemUrl">網址</label>
        <input id="itemUrl" class="input" type="text" placeholder="https://example.com" />
      </div>

      <div class="modal-actions">
        <button class="btn subtle" type="button" onclick="closeModal()">取消</button>
        <button class="btn primary" type="button" onclick="saveItem()">儲存</button>
      </div>

      <div class="modal-note">Enter 儲存 · Esc 關閉</div>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = {
      theme: "nuvex_theme",
      data: "nuvex_data_v3_zen",
      engine: "nuvex_engine"
    };

    const SEARCH_ENGINES = {
      google: {
        label: "Google",
        buildUrl: (q) => `https://www.google.com/search?q=${encodeURIComponent(q)}`
      },
      duckduckgo: {
        label: "DuckDuckGo",
        buildUrl: (q) => `https://duckduckgo.com/?q=${encodeURIComponent(q)}`
      },
      bing: {
        label: "Bing",
        buildUrl: (q) => `https://www.bing.com/search?q=${encodeURIComponent(q)}`
      }
    };

    const DEFAULT_DATA = [
      { type: "link", name: "Google", url: "https://google.com" },
      { type: "link", name: "YouTube", url: "https://youtube.com" },
      { type: "link", name: "GitHub", url: "https://github.com" },
      { type: "link", name: "ChatGPT", url: "https://chatgpt.com" },
      { type: "link", name: "Drive", url: "https://drive.google.com" },
      { type: "link", name: "Gmail", url: "https://mail.google.com" }
    ];

    const CATEGORIES = {
      Social: ["facebook", "instagram", "twitter", "x.com", "linkedin", "reddit", "discord"],
      Video: ["youtube", "twitch", "netflix", "disney", "hulu", "bilibili"],
      Gaming: ["steam", "epic", "xbox", "playstation", "nintendo"],
      Dev: ["github", "gitlab", "stackoverflow", "codepen", "vercel", "localhost"],
      AI: ["chatgpt", "openai", "gemini", "claude", "perplexity"],
      Shop: ["amazon", "shopee", "taobao", "momo", "pchome"]
    };

    const body = document.body;
    const themeBtn = document.getElementById("themeBtn");
    const clockEl = document.getElementById("clock");
    const dateTextEl = document.getElementById("dateText");
    const weatherBtn = document.getElementById("weatherBtn");
    const weatherTextEl = document.getElementById("weatherText");

    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const focusBtn = document.getElementById("focusBtn");
    const micBtn = document.getElementById("micBtn");
    const listenText = document.getElementById("listenText");

    const engineBtn = document.getElementById("engineBtn");
    const engineLabel = document.getElementById("engineLabel");
    const engineDropdown = document.getElementById("engineDropdown");

    const aiBtn = document.getElementById("aiBtn");
    const aiDropdown = document.getElementById("aiDropdown");

    const linksGrid = document.getElementById("linksGrid");
    const breadcrumbBar = document.getElementById("breadcrumbBar");
    const breadcrumbPath = document.getElementById("breadcrumbPath");
    const itemCountPill = document.getElementById("itemCountPill");

    const contextMenu = document.getElementById("contextMenu");
    const menuBgOptions = document.getElementById("menuBgOptions");
    const menuItemOptions = document.getElementById("menuItemOptions");

    const modal = document.getElementById("linkModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalDesc = document.getElementById("modalDesc");
    const itemNameInput = document.getElementById("itemName");
    const itemUrlInput = document.getElementById("itemUrl");
    const urlGroup = document.getElementById("urlGroup");

    let rootData = loadData();
    let currentPath = [];
    let currentModalType = "link";
    let isEditing = false;
    let contextTargetIndex = -1;
    let draggedIndex = null;
    let draggedItem = null;
    let dragAction = null;

    let activeEngine = localStorage.getItem(STORAGE_KEYS.engine) || "google";
    if (!SEARCH_ENGINES[activeEngine]) activeEngine = "google";

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.data));
        if (!Array.isArray(saved) || saved.length === 0) return structuredClone(DEFAULT_DATA);
        return saved.map(normalizeItem).filter(Boolean);
      } catch {
        return structuredClone(DEFAULT_DATA);
      }
    }

    function normalizeItem(item) {
      if (!item || typeof item !== "object") return null;

      if (item.type === "folder") {
        return {
          type: "folder",
          name: String(item.name || "Folder"),
          children: Array.isArray(item.children)
            ? item.children.map(normalizeItem).filter(Boolean)
            : []
        };
      }

      const url = String(item.url || "").trim();
      return {
        type: "link",
        name: String(item.name || "Untitled"),
        url: url || "https://google.com"
      };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEYS.data, JSON.stringify(rootData));
    }

    function getCurrentArray() {
      let current = rootData;
      for (const index of currentPath) {
        if (!current[index] || current[index].type !== "folder") return rootData;
        current = current[index].children;
      }
      return current;
    }

    function updateClock() {
      const now = new Date();

      clockEl.textContent = now.toLocaleTimeString("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      dateTextEl.textContent = now.toLocaleDateString("zh-TW", {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    function initTheme() {
      const savedTheme = localStorage.getItem(STORAGE_KEYS.theme);
      if (savedTheme === "light") body.classList.add("light-mode");
    }

    function toggleTheme() {
      body.classList.toggle("light-mode");
      localStorage.setItem(
        STORAGE_KEYS.theme,
        body.classList.contains("light-mode") ? "light" : "dark"
      );
    }

    themeBtn.addEventListener("click", toggleTheme);
    initTheme();

    function initWeatherShortcut() {
      weatherTextEl.textContent = "天氣";
      weatherBtn.addEventListener("click", () => {
        window.open("https://www.google.com/search?q=%E5%8F%B0%E5%8C%97%E5%A4%A9%E6%B0%A3", "_blank");
      });
    }

    initWeatherShortcut();

    function setEngine(engineKey) {
      if (!SEARCH_ENGINES[engineKey]) return;
      activeEngine = engineKey;
      engineLabel.textContent = SEARCH_ENGINES[engineKey].label;
      localStorage.setItem(STORAGE_KEYS.engine, engineKey);
    }

    setEngine(activeEngine);

    function togglePanel(panel, button) {
      const isOpen = panel.classList.contains("show");
      closeAllPanels();
      if (!isOpen) {
        panel.classList.add("show");
        button.classList.add("active");
      }
    }

    function closePanel(panel, button) {
      panel.classList.remove("show");
      button.classList.remove("active");
    }

    function closeAllPanels() {
      closePanel(engineDropdown, engineBtn);
      closePanel(aiDropdown, aiBtn);
    }

    engineBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      togglePanel(engineDropdown, engineBtn);
    });

    aiBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      togglePanel(aiDropdown, aiBtn);
    });

    engineDropdown.querySelectorAll("[data-engine]").forEach((item) => {
      item.addEventListener("click", () => {
        setEngine(item.dataset.engine);
        closeAllPanels();
        searchInput.focus();
      });
    });

    document.addEventListener("click", (e) => {
      if (!engineDropdown.contains(e.target) && !engineBtn.contains(e.target) &&
          !aiDropdown.contains(e.target) && !aiBtn.contains(e.target)) {
        closeAllPanels();
      }

      if (!contextMenu.contains(e.target)) {
        contextMenu.style.display = "none";
      }
    });

    focusBtn.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
    });

    document.querySelector(".toolbar").addEventListener("click", (e) => {
      const chip = e.target.closest(".toolbar-chip");
      if (!chip) return;
      const url = chip.dataset.open;
      if (url) window.open(url, "_blank");
    });

    function isLikelyUrl(value) {
      const v = value.trim();
      if (!v) return false;
      if (v.startsWith("http://") || v.startsWith("https://")) return true;
      return /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(v);
    }

    function normalizeUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      return "https://" + raw;
    }

    function submitSearch() {
      const q = searchInput.value.trim();
      if (!q) return;

      if (isLikelyUrl(q) && !q.includes(" ")) {
        window.location.href = normalizeUrl(q);
        return;
      }

      const engine = SEARCH_ENGINES[activeEngine] || SEARCH_ENGINES.google;
      window.location.href = engine.buildUrl(q);
    }

    searchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      submitSearch();
    });

    if ("webkitSpeechRecognition" in window) {
      const recognition = new webkitSpeechRecognition();
      recognition.lang = "zh-TW";
      recognition.interimResults = false;
      recognition.continuous = false;

      micBtn.addEventListener("click", () => {
        recognition.start();
        listenText.style.display = "block";
      });

      recognition.onresult = (event) => {
        const transcript = event.results?.[0]?.[0]?.transcript || "";
        searchInput.value = transcript;
        listenText.style.display = "none";
        setTimeout(submitSearch, 380);
      };

      recognition.onend = () => {
        listenText.style.display = "none";
      };

      recognition.onerror = () => {
        listenText.style.display = "none";
      };
    } else {
      micBtn.style.display = "none";
    }

    function getDomainFromUrl(url) {
      try {
        return new URL(normalizeUrl(url)).hostname;
      } catch {
        return "";
      }
    }

    function getHostnameShort(url) {
      const host = getDomainFromUrl(url);
      return host.replace(/^www\./, "") || "Website";
    }

    function getFaviconUrl(url) {
      const domain = getDomainFromUrl(url);
      if (!domain) return "https://www.google.com/s2/favicons?domain=google.com&sz=128";
      return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=128`;
    }

    function predictFolderName(item1, item2) {
      const getCategory = (url) => {
        const lower = String(url || "").toLowerCase();
        for (const cat in CATEGORIES) {
          if (CATEGORIES[cat].some((key) => lower.includes(key))) return cat;
        }
        return null;
      };

      const c1 = item1.type === "link" ? getCategory(item1.url) : null;
      const c2 = item2.type === "link" ? getCategory(item2.url) : null;

      if (c1 && c2 && c1 === c2) return c1;
      if (c1) return c1;
      if (c2) return c2;
      return "Folder";
    }

    function renderBreadcrumb() {
      if (currentPath.length === 0) {
        breadcrumbBar.style.display = "none";
        breadcrumbPath.innerHTML = "";
        return;
      }

      breadcrumbBar.style.display = "flex";

      let html = `<span class="breadcrumb-item" onclick="goRoot()" ondrop="dropOnBreadcrumb(event, -1)" ondragover="allowDrop(event)">Home</span>`;

      let tempPath = rootData;
      currentPath.forEach((idx, level) => {
        const folder = tempPath[idx];
        if (!folder) return;
        html += `<span style="opacity:.38; margin:0 8px;">/</span>`;

        if (level < currentPath.length - 1) {
          html += `<span class="breadcrumb-item" onclick="goToLevel(${level})" ondrop="dropOnBreadcrumb(event, ${level})" ondragover="allowDrop(event)">${escapeHtml(folder.name)}</span>`;
        } else {
          html += `<span style="font-weight:700; color: var(--text);">${escapeHtml(folder.name)}</span>`;
        }

        tempPath = folder.children || [];
      });

      breadcrumbPath.innerHTML = html;
    }

    function render() {
      const currentList = getCurrentArray();
      itemCountPill.textContent = `${currentList.length} items`;
      linksGrid.innerHTML = "";
      renderBreadcrumb();

      currentList.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.index = index;

        card.addEventListener("dragstart", (e) => dragStart(e, index));
        card.addEventListener("dragover", (e) => dragOver(e, index));
        card.addEventListener("dragleave", (e) => dragLeave(e));
        card.addEventListener("drop", (e) => drop(e, index));

        let iconHTML = "";
        let sub = "";

        if (item.type === "folder") {
          const count = Array.isArray(item.children) ? item.children.length : 0;
          sub = `${count} item${count === 1 ? "" : "s"}`;
          iconHTML = `
            <div class="icon-box">
              <svg class="folder-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 6h-8l-2-2H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"></path>
              </svg>
            </div>
          `;
          card.addEventListener("click", () => enterFolder(index));
        } else {
          sub = getHostnameShort(item.url);
          iconHTML = `
            <div class="icon-box">
              <img
                class="favicon"
                src="${getFaviconUrl(item.url)}"
                alt=""
                onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=google.com&sz=128';"
              />
            </div>
          `;
          card.addEventListener("click", () => {
            window.location.href = normalizeUrl(item.url);
          });
        }

        card.innerHTML = `
          ${iconHTML}
          <div class="card-title">${escapeHtml(item.name)}</div>
          <div class="card-sub">${escapeHtml(sub)}</div>
        `;

        card.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          e.stopPropagation();
          showContextMenu(e.clientX, e.clientY, "item", index);
        });

        linksGrid.appendChild(card);
      });

      const addCard = document.createElement("div");
      addCard.className = "card add-card";
      addCard.innerHTML = `
        <div class="add-box">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </div>
        <div class="card-title">新增</div>
        <div class="card-sub">Shortcut / Folder</div>
      `;

      addCard.addEventListener("click", () => openModal("link"));
      addCard.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        e.stopPropagation();
        showContextMenu(e.clientX, e.clientY, "bg");
      });

      linksGrid.appendChild(addCard);
    }

    function dragStart(e, index) {
      draggedIndex = index;
      draggedItem = getCurrentArray()[index];
      e.dataTransfer.effectAllowed = "move";
      requestAnimationFrame(() => {
        e.currentTarget.style.opacity = "0.45";
      });
    }

    function resetCardDragStyles(card) {
      card.classList.remove("drag-merge", "drag-sort-left", "drag-sort-right");
      card.style.opacity = "1";
    }

    function dragOver(e, targetIndex) {
      e.preventDefault();
      if (draggedIndex === null || draggedIndex === targetIndex) return;

      const list = getCurrentArray();
      const targetItem = list[targetIndex];
      const card = e.currentTarget;
      resetCardDragStyles(card);

      if (!targetItem) return;

      if (targetItem.type === "folder") {
        card.classList.add("drag-merge");
        dragAction = "folder-in";
        return;
      }

      const rect = card.getBoundingClientRect();
      const offsetX = e.clientX - rect.left;
      const centerZone = rect.width * 0.35;

      if (offsetX > centerZone && offsetX < rect.width - centerZone) {
        card.classList.add("drag-merge");
        dragAction = "merge";
      } else if (offsetX <= centerZone) {
        card.classList.add("drag-sort-left");
        dragAction = "sort-left";
      } else {
        card.classList.add("drag-sort-right");
        dragAction = "sort-right";
      }
    }

    function dragLeave(e) {
      resetCardDragStyles(e.currentTarget);
      dragAction = null;
    }

    function drop(e, targetIndex) {
      e.preventDefault();
      e.stopPropagation();

      const targetCard = e.currentTarget;
      resetCardDragStyles(targetCard);

      const cards = document.querySelectorAll(".card");
      if (cards[draggedIndex]) cards[draggedIndex].style.opacity = "1";

      if (draggedIndex === null || draggedIndex === targetIndex || !dragAction) {
        draggedIndex = null;
        draggedItem = null;
        dragAction = null;
        return;
      }

      const list = getCurrentArray();
      const targetItem = list[targetIndex];
      if (!targetItem || !draggedItem) return;

      if (dragAction === "folder-in") {
        targetItem.children.push(draggedItem);
        list.splice(draggedIndex, 1);
      } else if (dragAction === "merge") {
        const folderName = predictFolderName(targetItem, draggedItem);
        list[targetIndex] = {
          type: "folder",
          name: folderName,
          children: [targetItem, draggedItem]
        };
        list.splice(draggedIndex, 1);
      } else if (dragAction === "sort-left" || dragAction === "sort-right") {
        const item = list.splice(draggedIndex, 1)[0];
        let insertIndex = targetIndex;
        if (draggedIndex < targetIndex) insertIndex -= 1;
        if (dragAction === "sort-right") insertIndex += 1;
        if (insertIndex < 0) insertIndex = 0;
        if (insertIndex > list.length) insertIndex = list.length;
        list.splice(insertIndex, 0, item);
      }

      draggedIndex = null;
      draggedItem = null;
      dragAction = null;
      saveData();
      render();
    }

    function allowDrop(e) {
      e.preventDefault();
    }

    function dropOnBreadcrumb(e, levelIndex) {
      e.preventDefault();
      e.stopPropagation();
      if (draggedIndex === null || !draggedItem) return;

      let targetList = rootData;
      if (levelIndex > -1) {
        const path = currentPath.slice(0, levelIndex + 1);
        for (const idx of path) {
          if (!targetList[idx] || targetList[idx].type !== "folder") return;
          targetList = targetList[idx].children;
        }
      }

      getCurrentArray().splice(draggedIndex, 1);
      targetList.push(draggedItem);

      draggedIndex = null;
      draggedItem = null;
      dragAction = null;
      saveData();
      render();
    }

    function enterFolder(index) {
      currentPath.push(index);
      render();
    }

    function goUp() {
      if (currentPath.length > 0) currentPath.pop();
      render();
    }

    function goRoot() {
      currentPath = [];
      render();
    }

    function goToLevel(level) {
      currentPath = currentPath.slice(0, level + 1);
      render();
    }

    window.goUp = goUp;
    window.goRoot = goRoot;
    window.goToLevel = goToLevel;
    window.allowDrop = allowDrop;
    window.dropOnBreadcrumb = dropOnBreadcrumb;

    function showContextMenu(x, y, type, index = -1) {
      contextTargetIndex = index;
      contextMenu.style.display = "block";

      if (type === "bg") {
        menuBgOptions.style.display = "block";
        menuItemOptions.style.display = "none";
      } else {
        menuBgOptions.style.display = "none";
        menuItemOptions.style.display = "block";
      }

      const menuWidth = 190;
      const menuHeight = 124;
      const left = x + menuWidth > window.innerWidth ? x - menuWidth : x;
      const top = y + menuHeight > window.innerHeight ? y - menuHeight : y;

      contextMenu.style.left = `${Math.max(8, left)}px`;
      contextMenu.style.top = `${Math.max(8, top)}px`;
    }

    document.querySelector(".board").addEventListener("contextmenu", (e) => {
      if (e.target.closest(".card")) return;
      e.preventDefault();
      showContextMenu(e.clientX, e.clientY, "bg");
    });

    document.getElementById("ctxDelete").addEventListener("click", () => {
      const list = getCurrentArray();
      if (contextTargetIndex < 0 || !list[contextTargetIndex]) return;
      const item = list[contextTargetIndex];
      const ok = confirm(`確定要刪除「${item.name}」嗎？`);
      if (!ok) return;
      list.splice(contextTargetIndex, 1);
      saveData();
      render();
      contextMenu.style.display = "none";
    });

    document.getElementById("ctxEdit").addEventListener("click", () => {
      const list = getCurrentArray();
      if (contextTargetIndex < 0 || !list[contextTargetIndex]) return;
      openModal(list[contextTargetIndex].type, true);
      contextMenu.style.display = "none";
    });

    function openModal(type, editing = false) {
      currentModalType = type;
      isEditing = editing;
      modal.classList.add("active");

      if (type === "folder") {
        modalTitle.textContent = editing ? "編輯資料夾" : "新增資料夾";
        modalDesc.textContent = "建立分類資料夾，整理你的常用網站。";
        urlGroup.style.display = "none";
        itemNameInput.placeholder = "例如：工作 / 娛樂 / AI";
      } else {
        modalTitle.textContent = editing ? "編輯捷徑" : "新增捷徑";
        modalDesc.textContent = "可輸入網站名稱與網址，建立快速入口。";
        urlGroup.style.display = "block";
        itemNameInput.placeholder = "例如：YouTube";
      }

      if (editing) {
        const item = getCurrentArray()[contextTargetIndex];
        if (!item) return;
        itemNameInput.value = item.name || "";
        itemUrlInput.value = item.type === "link" ? item.url || "" : "";
      } else {
        itemNameInput.value = "";
        itemUrlInput.value = "";
      }

      setTimeout(() => itemNameInput.focus(), 30);
    }

    function closeModal() {
      modal.classList.remove("active");
      itemNameInput.value = "";
      itemUrlInput.value = "";
    }

    document.getElementById("linkModal").addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    function saveItem() {
      const list = getCurrentArray();
      const name = itemNameInput.value.trim();
      if (!name) {
        itemNameInput.focus();
        return;
      }

      if (currentModalType === "folder") {
        if (isEditing) {
          if (!list[contextTargetIndex]) return;
          list[contextTargetIndex].name = name;
        } else {
          list.push({
            type: "folder",
            name,
            children: []
          });
        }
      } else {
        let url = itemUrlInput.value.trim();
        if (!url) {
          itemUrlInput.focus();
          return;
        }

        url = normalizeUrl(url);

        if (isEditing) {
          if (!list[contextTargetIndex]) return;
          list[contextTargetIndex].name = name;
          list[contextTargetIndex].url = url;
        } else {
          list.push({
            type: "link",
            name,
            url
          });
        }
      }

      saveData();
      render();
      closeModal();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeAllPanels();
        contextMenu.style.display = "none";
        if (modal.classList.contains("active")) closeModal();
      }

      if (e.key === "/" && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }

      if (e.key === "Enter" && modal.classList.contains("active")) {
        const active = document.activeElement;
        if (active === itemNameInput || active === itemUrlInput) {
          e.preventDefault();
          saveItem();
        }
      }
    });

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
